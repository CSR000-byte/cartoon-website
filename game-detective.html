let currentCase,cluesFound=[],suspectsQuestioned=[],phase='intro';

function startCase(){
  currentCase=CASES[Math.floor(Math.random()*CASES.length)];
  cluesFound=[];suspectsQuestioned=[];phase='intro';
  render();
}

function findClue(id){
  if(cluesFound.includes(id))return;
  cluesFound.push(id);
  if(cluesFound.length>=currentCase.clues.length){
    document.querySelectorAll('.clue-list li').forEach(l=>l.classList.add('found'));
  }
  render();
  showToast('🔍 找到了线索！');
}

function questionSuspect(id){
  if(suspectsQuestioned.includes(id))return;
  suspectsQuestioned.push(id);
  render();
}

function accuse(id){
  const s=currentCase.suspects.find(s=>s.id===id);
  if(s.guilty){
    phase='win';
    render();
    showToast('🎉 破案成功！');
  }else{
    phase='wrong';
    render();
    showToast('❌ 冤枉好人了！再想想吧…',3000);
    setTimeout(()=>{phase='investigate';render();},2500);
  }
}

function render(){
  const area=document.getElementById('gameArea');
  if(!currentCase){startCase();return;}

  const cluesProgress=Math.round(cluesFound.length/currentCase.clues.length*100);
  const suspectProgress=Math.round(suspectsQuestioned.length/currentCase.suspects.length*100);

  if(phase==='intro'){
    area.innerHTML=`
      <div class="case-box">
        <h3>📁 ${currentCase.title}</h3>
        <p style="color:var(--text-secondary);">${currentCase.intro}</p>
        <div class="dialog-box">🐧 <strong>企鹅船长：</strong>"各位，在查明真相之前，谁也不准离开。我们去现场看看。"</div>
        <div style="text-align:center;margin-top:1rem;">
          <button class="btn btn-primary" onclick="phase='investigate';render();">🔍 开始调查</button>
        </div>
      </div>
    `;
  }else if(phase==='investigate'||phase==='wrong'){
    area.innerHTML=`
      <div class="case-box">
        <h3>🔍 收集线索 <span style="font-size:0.8rem;color:var(--text-muted);">(${cluesFound.length}/${currentCase.clues.length})</span></h3>
        <div class="progress-bar"><div style="width:${cluesProgress}%"></div></div>
        <ul class="clue-list">
          ${currentCase.clues.map(c=>`
            <li class="${cluesFound.includes(c.id)?'found':''}" onclick="findClue('${c.id}')">
              ${c.text}
              ${cluesFound.includes(c.id)?`<br><small style="color:var(--color-accent-yellow);">→ ${c.detail}</small>`:`<small style="color:var(--text-muted);">（点击调查）</small>`}
            </li>`).join('')}
        </ul>
      </div>
      <div class="case-box">
        <h3>👥 询问嫌疑人 <span style="font-size:0.8rem;color:var(--text-muted);">(${suspectsQuestioned.length}/${currentCase.suspects.length})</span></h3>
        <div class="progress-bar"><div style="width:${suspectProgress}%"></div></div>
        <div class="suspect-grid">
          ${currentCase.suspects.map(s=>`
            <div class="suspect-card" onclick="questionSuspect('${s.id}')">
              <div class="emoji">${s.emoji}</div>
              <div class="name">${s.name}</div>
              ${suspectsQuestioned.includes(s.id)?`
                <p style="font-size:0.75rem;color:var(--color-accent-teal);margin-top:0.3rem;">🗣️ "${s.alibi}"</p>
                <p style="font-size:0.7rem;color:var(--text-muted);">动机: ${s.motive}</p>
              `:`<small style="color:var(--text-muted);">（点击询问）</small>`}
            </div>`).join('')}
        </div>
      </div>
      ${cluesFound.length>=2?`
      <div style="text-align:center;margin:1.5rem 0;">
        <p style="color:var(--text-muted);margin-bottom:0.5rem;">线索足够多了，要指认真凶吗？</p>
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
          ${currentCase.suspects.map(s=>`<button class="btn btn-accent btn-accuse" onclick="accuse('${s.id}')">指认 ${s.emoji}${s.name}</button>`).join('')}
        </div>
      </div>`:''}
    `;
  }else if(phase==='win'){
    const guilty=currentCase.suspects.find(s=>s.guilty);
    area.innerHTML=`
      <div class="case-box" style="border-color:var(--color-accent-teal);">
        <h3>🎉 案件告破！</h3>
        <div style="font-size:5rem;text-align:center;">🔓</div>
        <p style="color:var(--color-accent-teal);font-size:1.2rem;text-align:center;"><strong>真凶是：${guilty.emoji} ${guilty.name}！</strong></p>
        <div class="dialog-box">${guilty.emoji} <strong>${guilty.name}：</strong>"${guilty.confession}"</div>
        <p style="color:var(--text-secondary);margin-top:1rem;">${currentCase.conclusion}</p>
        <div style="text-align:center;margin-top:1.5rem;display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="startCase();render();">🔍 下一个案件</button>
          <a href="game.html" class="btn btn-secondary">🎮 游戏厅</a>
        </div>
      </div>
    `;
  }
}

startCase();
</script>
