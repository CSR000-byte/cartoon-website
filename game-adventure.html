<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 小星迷路大冒险 · 卡创</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .game-wrapper {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    #gameCanvas {
      border-radius: var(--radius-lg);
      border: 3px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-float);
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
      display: block;
      margin: 0 auto;
      cursor: none;
      max-width: 100%;
    }
    .game-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .game-stat {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.08);
      font-family: var(--font-heading);
      font-size: 1.1rem;
    }
    .game-stat .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      display: block;
    }
    .combo-text {
      position: fixed;
      pointer-events: none;
      font-family: var(--font-heading);
      font-size: 2rem;
      color: var(--color-accent-yellow);
      text-shadow: 0 0 20px rgba(253,203,110,0.8);
      animation: comboUp 1s ease-out forwards;
      z-index: 100;
    }
    @keyframes comboUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
    }
    .game-over-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .game-over-box {
      background: var(--bg-dark);
      border: 2px solid var(--color-primary);
      border-radius: var(--radius-xl);
      padding: 2rem;
      text-align: center;
      max-width: 400px;
      box-shadow: var(--shadow-float-hover);
    }
    .game-over-box h2 {
      font-family: var(--font-heading);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .game-over-box .final-score {
      font-size: 3rem;
      font-family: var(--font-heading);
      color: var(--color-accent-yellow);
      text-shadow: 0 0 30px rgba(253,203,110,0.5);
    }
    .btn-group {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>

  <header class="site-header">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🎮</span>
        <span>卡创 · 小游戏厅</span>
      </a>
      <nav>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">🏠 首页</a></li>
          <li><a href="secret.html">🕵️ 绝密档案</a></li>
          <li><a href="about.html">💌 关于</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-container">
      <div class="game-wrapper">
        <div class="section-header">
          <div class="hero-badge" style="display:inline-block;margin-bottom:1rem;animation:float 2s ease-in-out infinite;">🎮 卡创街机厅</div>
          <h1 class="section-title">🐱 小星迷路大冒险</h1>
          <p class="section-subtitle">小星又迷路了！帮他收集星星找到回家的路吧！<br>（企鹅船长已经在赶来的路上了…）</p>
        </div>

        <div class="game-hud">
          <div class="game-stat">
            <span class="label">⭐ 星星币</span>
            <span id="scoreDisplay">0</span>
          </div>
          <div class="game-stat">
            <span class="label">❤️ 生命</span>
            <span id="livesDisplay">❤️❤️❤️</span>
          </div>
          <div class="game-stat">
            <span class="label">🔥 连击</span>
            <span id="comboDisplay">x1</span>
          </div>
          <div class="game-stat">
            <span class="label">🌌 波次</span>
            <span id="waveDisplay">1</span>
          </div>
        </div>

        <canvas id="gameCanvas" width="700" height="500"></canvas>

        <p style="color:var(--text-muted);margin-top:1rem;font-size:0.85rem;">
          🖱️ <strong>鼠标移动</strong>控制小星 | 💡 收集 ⭐ 星星币 | 💣 躲开障碍物 | 🍙 吃到特殊道具加分
        </p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-text">
      © 2026 <strong>卡创</strong> · 小游戏厅 🎮 | 小星又迷路了，这不是 Bug，是 Feature ✨
    </p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 游戏状态 ---
    let score = 0;
    let lives = 3;
    let combo = 0;
    let maxCombo = 1;
    let wave = 1;
    let gameRunning = true;
    let gamePaused = false;
    let invincible = false;
    let invincibleTimer = 0;
    let shakeTimer = 0;
    let shakeIntensity = 0;

    // --- 玩家（小星）---
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 22,
      speed: 6,
      trail: []
    };

    // --- 鼠标位置 ---
    let mouseX = player.x;
    let mouseY = player.y;
    let mouseOnCanvas = false;

    // --- 游戏对象 ---
    let stars = [];
    let obstacles = [];
    let powerups = [];
    let particles = [];
    let floatingTexts = [];
    let bgStars = [];

    // --- 生成背景星星 ---
    for (let i = 0; i < 80; i++) {
      bgStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.01
      });
    }

    // --- 输入处理 ---
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouseX = (e.clientX - rect.left) * scaleX;
      mouseY = (e.clientY - rect.top) * scaleY;
      mouseOnCanvas = true;
    });

    canvas.addEventListener('mouseleave', () => { mouseOnCanvas = false; });
    canvas.addEventListener('mouseenter', () => { mouseOnCanvas = true; });

    // 移动端触摸
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouseX = (e.touches[0].clientX - rect.left) * scaleX;
      mouseY = (e.touches[0].clientY - rect.top) * scaleY;
      mouseOnCanvas = true;
    }, { passive: false });

    canvas.addEventListener('touchend', () => { mouseOnCanvas = false; });

    // --- 生成游戏对象 ---
    function spawnStar() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;
      switch(edge) {
        case 0: x = Math.random() * canvas.width; y = -20; break;
        case 1: x = canvas.width + 20; y = Math.random() * canvas.height; break;
        case 2: x = Math.random() * canvas.width; y = canvas.height + 20; break;
        case 3: x = -20; y = Math.random() * canvas.height; break;
      }
      stars.push({
        x, y,
        radius: 12,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.1,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        pulse: Math.random() * Math.PI * 2
      });
    }

    function spawnObstacle() {
      const types = [
        { emoji: '🪨', color: '#888', name: '陨石', radius: 18, speed: 1.5 },
        { emoji: '🪐', color: '#FDCB6E', name: '土星环', radius: 22, speed: 1 },
        { emoji: '🕳️', color: '#000', name: '黑洞', radius: 26, speed: 0.6 },
        { emoji: '🦊', color: '#FF7675', name: '火狐的零件', radius: 16, speed: 2 },
        { emoji: '🧨', color: '#FF0000', name: '火狐的炸弹', radius: 14, speed: 2.5 },
      ];
      const type = types[Math.floor(Math.random() * types.length)];
      const edge = Math.floor(Math.random() * 4);
      let x, y, vx, vy;
      switch(edge) {
        case 0: x = Math.random() * canvas.width; y = -30;
                vx = (Math.random()-0.5)*2; vy = type.speed; break;
        case 1: x = canvas.width + 30; y = Math.random() * canvas.height;
                vx = -type.speed; vy = (Math.random()-0.5)*2; break;
        case 2: x = Math.random() * canvas.width; y = canvas.height + 30;
                vx = (Math.random()-0.5)*2; vy = -type.speed; break;
        case 3: x = -30; y = Math.random() * canvas.height;
                vx = type.speed; vy = (Math.random()-0.5)*2; break;
      }
      obstacles.push({ x, y, vx, vy, ...type });
    }

    function spawnPowerup() {
      const types = [
        { emoji: '🍙', name: '胖达的饭团', effect: 'bonus', points: 50, color: '#fff' },
        { emoji: '💖', name: '额外生命', effect: 'life', color: '#FF7675' },
        { emoji: '⚡', name: '彩虹加速', effect: 'speed', color: '#FDCB6E' },
        { emoji: '🛡️', name: '企鹅护盾', effect: 'shield', color: '#00CEC9' },
      ];
      const type = types[Math.floor(Math.random() * types.length)];
      powerups.push({
        x: Math.random() * (canvas.width - 80) + 40,
        y: Math.random() * (canvas.height - 80) + 40,
        radius: 15,
        ...type,
        life: 400 + Math.random() * 200
      });
    }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          life: 30 + Math.random() * 20,
          maxLife: 50,
          color,
          radius: Math.random() * 4 + 1
        });
      }
    }

    function spawnFloatingText(x, y, text, color) {
      floatingTexts.push({ x, y, text, color, life: 60, vy: -2 });
    }

    // --- 碰撞检测 ---
    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    // --- 玩家受伤 ---
    function hitPlayer(source) {
      if (invincible || !gameRunning) return;
      lives--;
      combo = 0;
      invincible = true;
      invincibleTimer = 90;
      shakeTimer = 20;
      shakeIntensity = 8;
      spawnParticles(player.x, player.y, '#FF7675', 25);
      spawnFloatingText(player.x, player.y - 20, source || '💥痛!', '#FF7675');

      if (lives <= 0) {
        endGame();
      }
    }

    // --- 游戏结束 ---
    function endGame() {
      gameRunning = false;
      spawnParticles(player.x, player.y, '#FDCB6E', 50);
      spawnParticles(player.x, player.y, '#FF7675', 50);

      const roastMessages = [
        '企鹅船长：第947次迷路…我一点都不意外。',
        '火狐：需要我发明一个不掉坑的装置吗？成功率22%！',
        '胖达：要不要先吃点东西再继续？',
        '彩虹马：迷路保险了解一下？只要998星币！',
        '月兔：我的导航显示…呃，信号不好我先挂了。',
        '企鹅船长：我的第386封辞职信就是为这一刻准备的。',
      ];
      const roast = roastMessages[Math.floor(Math.random() * roastMessages.length)];

      setTimeout(() => {
        const overlay = document.createElement('div');
        overlay.className = 'game-over-overlay';
        overlay.innerHTML = `
          <div class="game-over-box">
            <div style="font-size:4rem;">🐱💫</div>
            <h2>小星又迷路了！</h2>
            <p style="color:var(--text-secondary);">${roast}</p>
            <div class="final-score">⭐ ${score}</div>
            <p style="color:var(--text-muted);">最大连击: x${maxCombo} | 到达波次: ${wave}</p>
            <div class="btn-group">
              <button class="btn btn-primary" onclick="location.reload()">🔄 再来一次</button>
              <button class="btn btn-secondary" onclick="this.closest('.game-over-overlay').remove()">👀 看看残局</button>
              <a href="index.html" class="btn btn-accent">🏠 回首页</a>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
      }, 800);
    }

    // --- 更新逻辑 ---
    function update() {
      if (!gameRunning || gamePaused) return;

      // 玩家追踪鼠标
      if (mouseOnCanvas) {
        const dx = mouseX - player.x;
        const dy = mouseY - player.y;
        const d = Math.hypot(dx, dy);
        if (d > 2) {
          const speed = player.speed * (powerups.find(p => p.effect === 'speed') ? 1.6 : 1);
          player.x += (dx / d) * Math.min(speed, d);
          player.y += (dy / d) * Math.min(speed, d);
        }
      }

      // 边界限制
      player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
      player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

      // 轨迹
      player.trail.push({ x: player.x, y: player.y, life: 12 });
      if (player.trail.length > 12) player.trail.shift();
      player.trail.forEach(t => t.life--);
      player.trail = player.trail.filter(t => t.life > 0);

      // 无敌计时
      if (invincible) {
        invincibleTimer--;
        if (invincibleTimer <= 0) invincible = false;
      }
      if (shakeTimer > 0) shakeTimer--;

      // 更新星星
      stars.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;
        s.rotation += s.rotSpeed;
        s.pulse += 0.05;
      });

      // 更新障碍物
      obstacles.forEach(o => {
        o.x += o.vx;
        o.y += o.vy;
      });

      // 更新道具
      powerups.forEach(p => { p.life--; });

      // 更新粒子
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.96;
        p.vy *= 0.96;
      });

      // 更新浮动文字
      floatingTexts.forEach(f => {
        f.y += f.vy;
        f.life--;
      });

      // 碰撞检测：星星
      for (let i = stars.length - 1; i >= 0; i--) {
        if (dist(player, stars[i]) < player.radius + stars[i].radius) {
          combo++;
          if (combo > maxCombo) maxCombo = combo;
          const bonusPoints = 10 * Math.min(combo, 10);
          score += bonusPoints;
          spawnParticles(stars[i].x, stars[i].y, '#FDCB6E', 8);
          spawnFloatingText(stars[i].x, stars[i].y, `+${bonusPoints}`, '#FDCB6E');
          if (combo > 5 && combo % 5 === 0) {
            spawnFloatingText(stars[i].x, stars[i].y - 25,
              ['喵!', '棒!', '赞!', '太强了!', '小星加油!'][Math.floor(Math.random()*5)],
              '#00CEC9');
          }
          stars.splice(i, 1);
        }
      }

      // 碰撞检测：障碍物
      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (dist(player, obstacles[i]) < player.radius + obstacles[i].radius) {
          hitPlayer(obstacles[i].name);
          spawnParticles(obstacles[i].x, obstacles[i].y, '#FF7675', 15);
          obstacles.splice(i, 1);
        }
      }

      // 碰撞检测：道具
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        if (dist(player, p) < player.radius + p.radius) {
          if (p.effect === 'bonus') {
            score += p.points;
            spawnFloatingText(p.x, p.y, `+${p.points}`, '#FDCB6E');
            spawnParticles(p.x, p.y, '#FDCB6E', 12);
          } else if (p.effect === 'life') {
            lives = Math.min(lives + 1, 5);
            spawnFloatingText(p.x, p.y, '+❤️', '#FF7675');
            spawnParticles(p.x, p.y, '#FF7675', 20);
          } else if (p.effect === 'shield') {
            invincible = true;
            invincibleTimer = 180;
            spawnFloatingText(p.x, p.y, '🛡️护盾!', '#00CEC9');
          }
          powerups.splice(i, 1);
        }
      }

      // 清除越界对象
      const margin = 60;
      stars = stars.filter(s => s.x > -margin && s.x < canvas.width + margin && s.y > -margin && s.y < canvas.height + margin);
      obstacles = obstacles.filter(o => o.x > -margin && o.x < canvas.width + margin && o.y > -margin && o.y < canvas.height + margin);
      powerups = powerups.filter(p => p.life > 0);
      particles = particles.filter(p => p.life > 0);
      floatingTexts = floatingTexts.filter(f => f.life > 0);

      // 波次管理
      const difficulty = Math.min(wave, 15);
      if (stars.length < 5 + difficulty) spawnStar();
      if (obstacles.length < 2 + Math.floor(difficulty / 2)) spawnObstacle();
      if (powerups.length < 1 && Math.random() < 0.008) spawnPowerup();

      // 每收集 30 颗星星，进入下一波
      const newWave = Math.floor(score / 150) + 1;
      if (newWave > wave) {
        wave = newWave;
        spawnFloatingText(player.x, player.y - 30, `🌌 第${wave}波!`, '#A29BFE');
        spawnParticles(player.x, player.y, '#A29BFE', 30);
        // 波次奖励星星
        for (let i = 0; i < 3; i++) spawnStar();
      }

      // 玩家速度道具超时
      const speedPowerup = powerups.find(p => p.effect === 'speed');
      if (speedPowerup && speedPowerup.life < 60) {
        // 即将过期提示
      }
    }

    // --- 渲染 ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 屏幕震动
      let sx = 0, sy = 0;
      if (shakeTimer > 0) {
        sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
        sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
      }
      ctx.save();
      ctx.translate(sx, sy);

      // 背景星星
      bgStars.forEach(s => {
        s.twinkle += s.speed;
        const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });

      // 粒子
      particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.fillStyle = p.color.replace(')', `, ${alpha})`);
        if (p.color.startsWith('#')) {
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // 道具
      powerups.forEach(p => {
        const pulse = 1 + Math.sin(Date.now() / 300) * 0.15;
        const alpha = p.life < 60 ? p.life / 60 : 1;
        ctx.globalAlpha = alpha;
        ctx.font = `${24 * pulse}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(p.emoji, p.x, p.y + 8);

        // 发光环
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * pulse, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;

      // 星星收集物
      stars.forEach(s => {
        const pulse = 1 + Math.sin(s.pulse) * 0.2;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation);
        ctx.font = `${22 * pulse}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⭐', 0, 0);

        // 光晕
        const gradient = ctx.createRadialGradient(0, 0, s.radius * 0.3, 0, 0, s.radius * 1.5);
        gradient.addColorStop(0, 'rgba(253,203,110,0.4)');
        gradient.addColorStop(1, 'rgba(253,203,110,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, s.radius * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // 障碍物
      obstacles.forEach(o => {
        ctx.font = `${o.radius * 1.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(o.emoji, o.x, o.y);

        // 危险光环
        ctx.strokeStyle = 'rgba(255,118,117,0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // 玩家轨迹
      player.trail.forEach((t, i) => {
        const alpha = t.life / 12 * 0.3;
        ctx.fillStyle = `rgba(108,92,231,${alpha})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, player.radius * (t.life / 12) * 0.7, 0, Math.PI * 2);
        ctx.fill();
      });

      // 玩家
      if (!invincible || Math.floor(Date.now() / 100) % 2 === 0) {
        // 光晕
        const glowGrad = ctx.createRadialGradient(player.x, player.y, player.radius * 0.4,
                                                   player.x, player.y, player.radius * 1.8);
        glowGrad.addColorStop(0, invincible ? 'rgba(0,206,201,0.6)' : 'rgba(108,92,231,0.5)');
        glowGrad.addColorStop(1, 'rgba(108,92,231,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius * 1.8, 0, Math.PI * 2);
        ctx.fill();

        // 小星本体
        ctx.font = `${player.radius * 1.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🐱', player.x, player.y);

        // 方向指示（小尾巴）
        if (mouseOnCanvas) {
          const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
          ctx.font = '14px sans-serif';
          ctx.fillText('💫', player.x + Math.cos(angle + Math.PI) * player.radius * 1.2,
                              player.y + Math.sin(angle + Math.PI) * player.radius * 1.2);
        }
      }

      // 浮动文字
      floatingTexts.forEach(f => {
        const alpha = f.life / 60;
        ctx.globalAlpha = alpha;
        ctx.font = 'bold 16px "Quicksand", sans-serif';
        ctx.fillStyle = f.color;
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
      });
      ctx.globalAlpha = 1;

      ctx.restore();

      // 鼠标光标（准星）
      if (mouseOnCanvas && gameRunning) {
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 12, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(mouseX - 18, mouseY);
        ctx.lineTo(mouseX - 8, mouseY);
        ctx.moveTo(mouseX + 8, mouseY);
        ctx.lineTo(mouseX + 18, mouseY);
        ctx.moveTo(mouseX, mouseY - 18);
        ctx.lineTo(mouseX, mouseY - 8);
        ctx.moveTo(mouseX, mouseY + 8);
        ctx.lineTo(mouseX, mouseY + 18);
        ctx.stroke();
      }

      // 更新 HUD
      document.getElementById('scoreDisplay').textContent = score;
      const hearts = ['🖤','🖤','🖤','🖤','🖤'];
      for (let i = 0; i < Math.min(lives, 5); i++) hearts[i] = '❤️';
      document.getElementById('livesDisplay').textContent = hearts.slice(0, Math.max(lives, 0)).join('');
      document.getElementById('comboDisplay').textContent = `x${combo}`;
      document.getElementById('waveDisplay').textContent = wave;
    }

    // --- 游戏循环 ---
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // --- 键盘快捷键 ---
    document.addEventListener('keydown', (e) => {
      if (e.key === 'p' || e.key === 'P') {
        gamePaused = !gamePaused;
        showToast(gamePaused ? '⏸️ 暂停中…' : '▶️ 继续！');
      }
      if (e.key === 'r' || e.key === 'R') {
        if (!gameRunning) location.reload();
      }
    });

    // --- 启动 ---
    console.log('🎮 小星迷路大冒险 已就绪！');
    console.log('🖱️ 鼠标控制小星 | P 暂停 | R 重新开始');
    console.log('🐱 小星：等等…我应该往哪边走？？');
    for (let i = 0; i < 8; i++) spawnStar();
    gameLoop();

    // 每分钟随机刷道具
    setInterval(() => {
      if (gameRunning && powerups.length < 3 && Math.random() < 0.6) spawnPowerup();
    }, 15000);
  })();
  </script>
</body>
</html>
