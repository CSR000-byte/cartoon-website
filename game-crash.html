<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 星际翻车模拟器 · 卡创</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💥</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .crash-container{max-width:750px;margin:0 auto;text-align:center;}
    #crashCanvas{border-radius:var(--radius-lg);border:3px solid rgba(255,255,255,0.1);box-shadow:var(--shadow-float);display:block;margin:0 auto;max-width:100%;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%);}
    .crash-hud{display:flex;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
    .crash-stat{background:var(--bg-card);border-radius:var(--radius-md);padding:0.5rem 1.2rem;border:1px solid rgba(255,255,255,0.08);font-family:var(--font-heading);font-size:1.1rem;}
  </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<header class="site-header">
  <div class="nav-container">
    <a href="game.html" class="nav-logo"><span class="logo-icon">💥</span><span>卡创 · 翻车模拟器</span></a>
    <nav><ul class="nav-links"><li><a href="game.html">🎮 游戏厅</a></li><li><a href="index.html">🏠 首页</a></li></ul></nav>
  </div>
</header>
<main>
<section class="page-container">
<div class="crash-container">
  <div class="section-header">
    <div class="hero-badge" style="display:inline-block;margin-bottom:1rem;animation:float 2s ease-in-out infinite;">💥 搞笑游戏</div>
    <h1 class="section-title">🚀 星际小猫号·翻车模拟器</h1>
    <p class="section-subtitle">驾驶星际小猫号穿越陨石带！队友们会给你「建议」——<br><strong style="color:var(--color-accent-pink);">听他们的 = 必炸。</strong></p>
  </div>
  <div class="crash-hud">
    <div class="crash-stat"><span style="font-size:0.65rem;color:var(--text-muted);display:block;">⏱️ 存活</span><span id="timeDisplay">0.0</span>s</div>
    <div class="crash-stat"><span style="font-size:0.65rem;color:var(--text-muted);display:block;">🏆 最佳</span><span id="bestDisplay">0.0</span>s</div>
    <div class="crash-stat"><span style="font-size:0.65rem;color:var(--text-muted);display:block;">💥 翻车</span><span id="crashDisplay">0</span>次</div>
  </div>
  <canvas id="crashCanvas" width="700" height="500"></canvas>
  <p style="color:var(--text-muted);margin-top:0.8rem;font-size:0.85rem;">⌨️ ⬆️⬇️ <strong>上下方向键</strong> 移动飞船 | 躲避陨石 | 🗯️ 队友「建议」仅供参考 | <strong>P</strong> 暂停</p>
<div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.5rem;">
<button class="btn btn-secondary" onclick="window.pauseGame()" style="font-size:0.8rem;padding:0.3rem 1rem;">⏯️ 暂停(P)</button>
<button class="btn btn-secondary" onclick="window.restart()" style="font-size:0.8rem;padding:0.3rem 1rem;">🔄 重新开始</button>
<a href="game.html" class="btn btn-secondary" style="font-size:0.8rem;padding:0.3rem 1rem;">🚪 退出</a>
</div>
</div>
</section>
</main>
<div class="toast" id="toast"></div>
<script src="js/main.js"></script>
<script>
// 🎵 配乐
let mo=true;const ac=new(window.AudioContext||window.webkitAudioContext)();
function pn(f,d,s,t='square',v=0.05){if(!mo)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+d);}catch(e){}}
function bgm(){if(!mo)return;const n=ac.currentTime;const m=[330,392,440,392,349,330,294,330,392,440,523,440,392,349,330,294];m.forEach((f,i)=>pn(f,0.18,n+i*0.2,'triangle',0.04));setTimeout(bgm,m.length*200+700);}
bgm();document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='m'){mo=!mo;showToast(mo?'🔊':'🔇');}});
</script>
<script>
(function(){
  const canvas=document.getElementById('crashCanvas'),ctx=canvas.getContext('2d');
  let shipY=canvas.height/2,shipX=120,shipW=50,shipH=35;
  let rocks=[],particles=[],floats=[],score=0,best=localStorage.getItem('crashBest')||0,crashes=0;
  let gameOn=true,adviceTimer=0,shakeTimer=0;
  const advice=[
    {text:'小星：往左！不，往右！等等我想想…',from:'🐱',wrong:'left'},
    {text:'火狐：冲过去！我有23%的把握没事！',from:'🦊',wrong:'up'},
    {text:'胖达：慢一点…我要晕船了…',from:'🐼',wrong:'down'},
    {text:'月兔：导航显示前方安全！（信号延迟3秒）',from:'🐰',wrong:'any'},
    {text:'彩虹马：加速冲！我有魔法护盾！（没有）',from:'🦄',wrong:'up'},
    {text:'企鹅船长：保持航向…虽然这艘船迟早会炸。',from:'🐧',wrong:'none'},
  ];
  let currentAdvice=null,adviceLife=0;

  document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')shipY-=25;if(e.key==='ArrowDown')shipY+=25;shipY=Math.max(20,Math.min(canvas.height-20,shipY));});

  canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();shipY=(e.touches[0].clientY-r.top)*(canvas.height/r.height);shipY=Math.max(20,Math.min(canvas.height-20,shipY));},{passive:false});

  canvas.addEventListener('click',e=>{if(!gameOn)restart();});
  function restart(){shipY=canvas.height/2;rocks=[];particles=[];floats=[];score=0;crashes++;gameOn=true;adviceTimer=0;currentAdvice=null;document.getElementById('crashDisplay').textContent=crashes;}
  function pauseGame(){if(!gameOn)return;gameOn=!gameOn;showToast(gameOn?'▶️ 继续':'⏸️ 暂停中');}
  window.restart=restart;window.pauseGame=pauseGame;
  document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='p')pauseGame();});

  function spawnRock(){
    const r=15+Math.random()*25;
    rocks.push({x:canvas.width+40,y:Math.random()*canvas.height,r,vy:(Math.random()-0.5)*2,vx:-(2+Math.random()*3+score/10),color:['#888','#FDCB6E','#FF7675','#6C5CE7'][Math.floor(Math.random()*4)]});
  }

  function hit(){
    gameOn=false;score=Math.floor(score*10)/10;
    if(score>best){best=score;localStorage.setItem('crashBest',best);}
    document.getElementById('bestDisplay').textContent=best;
    for(let i=0;i<50;i++)particles.push({x:shipX,y:shipY,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:30+Math.random()*30,color:'#FF7675',r:Math.random()*4+1});
    const taunts=['企鹅船长：我就知道。3.7秒，比上次还差。','火狐：别难过！下次成功率就是24%了！','胖达：要不要先吃点东西压压惊？','小星：嘿！你比我迷路还快！','彩虹马：飞船保险了解一下？现在买打9.8折！'];
    setTimeout(()=>{
      const ov=document.createElement('div');
      ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:1000;';
      ov.innerHTML=`<div style="background:var(--bg-dark);border:2px solid var(--color-primary);border-radius:var(--radius-xl);padding:2.5rem;text-align:center;max-width:420px;box-shadow:var(--shadow-float-hover);">
        <div style="font-size:5rem;">🚀💥</div><h2 style="font-family:var(--font-heading);font-size:2rem;">翻车了！</h2>
        <p style="color:var(--text-secondary);">${taunts[Math.floor(Math.random()*taunts.length)]}</p>
        <div style="font-size:4rem;font-family:var(--font-heading);color:var(--color-accent-yellow);">${score}s</div>
        <p style="color:var(--text-muted);">🏆 最佳纪录: ${best}s | 已翻车: ${crashes}次</p>
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
          <button class="btn btn-primary" onclick="this.closest('div[style*=\"fixed\"]').remove();restart();">🔄 再来！</button>
          <a href="game.html" class="btn btn-secondary">🎮 游戏厅</a></div></div>`;
      document.body.appendChild(ov);
    },600);
  }

  function update(){
    if(!gameOn)return;
    score+=0.016;
    document.getElementById('timeDisplay').textContent=(Math.floor(score*10)/10).toFixed(1);
    if(Math.random()<0.02+score/300)spawnRock();
    if(score>3&&Math.random()<0.015+score/500)spawnRock();

    adviceTimer++;
    if(adviceTimer>120+Math.random()*180){
      adviceTimer=0;currentAdvice=advice[Math.floor(Math.random()*advice.length)];adviceLife=150;
    }
    if(adviceLife>0)adviceLife--;
    if(adviceLife<=0)currentAdvice=null;

    rocks.forEach(r=>{r.x+=r.vx;r.y+=r.vy;});
    rocks=rocks.filter(r=>r.x>-80);
    rocks.forEach(r=>{
      if(Math.abs(r.x-shipX)<r.r+shipW/2&&Math.abs(r.y-shipY)<r.r+shipH/2){hit();}
    });
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.95;p.vy*=0.95;});
    particles=particles.filter(p=>p.life>0);
    if(shakeTimer>0)shakeTimer--;
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 背景星星
    for(let i=0;i<40;i++){
      const sx=(i*173+score*30)%canvas.width,sy=(i*97)%canvas.height;
      ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(score*2+i)*0.2)+')';
      ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();
    }
    // 陨石
    rocks.forEach(r=>{
      ctx.font=`${r.r*1.3}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🪨',r.x,r.y);
    });
    // 粒子
    particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
    // 飞船
    const sx=shakeTimer>0?shipX+(Math.random()-0.5)*shakeTimer*2:shipX;
    const sy=shakeTimer>0?shipY+(Math.random()-0.5)*shakeTimer*2:shipY;
    ctx.font='40px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚀',sx,sy);
    // 护盾环
    ctx.strokeStyle='rgba(108,92,231,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,35,0,Math.PI*2);ctx.stroke();
    // 建议气泡
    if(currentAdvice){
      ctx.fillStyle='rgba(0,0,0,0.8)';const bw=ctx.measureText(currentAdvice.text).width+20;
      const bx=sx+60,by=sy-60;
      ctx.beginPath();ctx.roundRect(bx-10,by-15,bw+20,35,15);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 13px Quicksand,sans-serif';ctx.textAlign='left';
      ctx.fillText(currentAdvice.from+' '+currentAdvice.text,bx,by+5);
    }
  }

    if(!gameOn){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#FFF';ctx.font='bold 36px Fredoka One';ctx.textAlign='center';ctx.fillText('⏸️ 暂停中',canvas.width/2,canvas.height/2);
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
  document.getElementById('bestDisplay').textContent=best;
  for(let i=0;i<4;i++)spawnRock();
  loop();
})();
</script>
</body>
</html>
