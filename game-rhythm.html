<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎵 钢琴块 · 卡创</title>
<link rel="stylesheet" href="css/style.css">
<style>
#gc{border-radius:var(--radius-lg);border:3px solid rgba(255,255,255,0.12);box-shadow:var(--shadow-float);display:block;margin:0 auto;max-width:100%;background:#0a0a1e;cursor:pointer;touch-action:none;}
.hud{display:flex;justify-content:center;gap:1rem;margin:0.5rem 0;}
.hud span{background:var(--bg-card);padding:0.35rem 0.9rem;border-radius:var(--radius-pill);font-family:var(--font-heading);font-size:0.9rem;border:1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<header class="site-header"><div class="nav-container">
<a href="game.html" class="nav-logo"><span class="logo-icon">🎵</span><span>钢琴块</span></a>
<nav><ul class="nav-links"><li><a href="game.html">🎮游戏厅</a></li><li><a href="index.html">🏠首页</a></li></ul></nav>
</div></header>
<main><section class="page-container" style="text-align:center;">
<h2 style="font-family:var(--font-heading);margin-bottom:0.5rem;">🎹 星际钢琴块</h2>
<p style="color:var(--text-secondary);margin-bottom:0.5rem;">⌨️ <b>D F J K</b> 四键控制 | 🖱️也可点击 | P暂停 M静音</p>
<div class="hud"><span>🎯<b id="s">0</b></span><span>🔥<b id="c">x1</b></span><span>❌<b id="m">0</b></span></div>
<canvas id="gc" width="400" height="550"></canvas>
<div style="display:flex;gap:8px;justify-content:center;margin:6px 0;">
<span style="display:inline-block;width:60px;height:50px;line-height:50px;background:var(--bg-card);border-radius:10px;font-size:1.5rem;text-align:center;border:2px solid #6C5CE7;">D</span>
<span style="display:inline-block;width:60px;height:50px;line-height:50px;background:var(--bg-card);border-radius:10px;font-size:1.5rem;text-align:center;border:2px solid #FF7675;">F</span>
<span style="display:inline-block;width:60px;height:50px;line-height:50px;background:var(--bg-card);border-radius:10px;font-size:1.5rem;text-align:center;border:2px solid #FDCB6E;">J</span>
<span style="display:inline-block;width:60px;height:50px;line-height:50px;background:var(--bg-card);border-radius:10px;font-size:1.5rem;text-align:center;border:2px solid #00CEC9;">K</span>
</div>
<div style="margin-top:0.5rem;display:flex;gap:0.5rem;justify-content:center;">
<button class="btn btn-primary" id="startBtn" onclick="G.start()" style="font-size:0.9rem;padding:0.5rem 1.5rem;">▶️ 开始游戏</button>
<button class="btn btn-secondary" onclick="G.pause()" style="font-size:0.75rem;padding:0.3rem 0.9rem;">⏯️暂停</button>
<a href="game.html" class="btn btn-secondary" style="font-size:0.75rem;padding:0.3rem 0.9rem;">🚪退出</a>
</div>
</section></main>
<script src="js/main.js"></script>
<script>
// 🎵
let mo=true;const ac=new(window.AudioContext||window.webkitAudioContext)();
function pn(f,d,s,t='square',v=0.05){if(!mo)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+d);}catch(e){}}
function bgm(){if(!mo)return;const n=ac.currentTime;[523,659,784,880,784,659,523,440,494,523,587,659,523,440,392,440].forEach((f,i)=>pn(f,0.12,n+i*0.14,'triangle',0.04));setTimeout(bgm,2600);}bgm();
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='m')mo=!mo;});

// 游戏
(function(){
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height,COLS=4,CW=W/COLS;
let tiles=[],sc=0,combo=0,best=1,miss=0,go=false,pa=false,spd=3,spT=0,started=false;
const colors=['#6C5CE7','#FF7675','#FDCB6E','#00CEC9'];

function spTile(){const col=Math.floor(Math.random()*COLS);tiles.push({col,x:col*CW,y:-60,w:CW-4,h:80,hit:false,c:colors[col]});}

function hitCol(col){
  if(!go||pa)return;
  let h=false;
  for(let i=tiles.length-1;i>=0;i--){const t=tiles[i];if(!t.hit&&t.col===col&&t.y+HZ>H-60){t.hit=true;h=true;combo++;if(combo>best)best=combo;sc+=10*(1+Math.floor(combo/10));pn(parseInt(colors[col].slice(1),16),0.1,ac.currentTime,'square',0.08);break;}}
  if(!h){combo=0;miss++;}updH();
}

// 键盘控制 D/F/J/K
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='p'){pa=!pa;return;}
  const km={d:0,f:1,j:2,k:3};if(km[k]!==undefined)hitCol(km[k]);
});

// 鼠标点击
cv.addEventListener('click',e=>{
  if(!go||pa)return;
  const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  let h=false;
  for(let i=tiles.length-1;i>=0;i--){const t=tiles[i];if(!t.hit&&mx>t.x&&mx<t.x+t.w&&my>t.y&&my<t.y+t.h){t.hit=true;h=true;combo++;if(combo>best)best=combo;sc+=10*(1+Math.floor(combo/10));pn(parseInt(colors[t.col].slice(1),16),0.1,ac.currentTime,'square',0.08);break;}}
  if(!h){combo=0;miss++;}updH();
});

const HZ=80;

function updH(){document.getElementById('s').textContent=sc;document.getElementById('c').textContent='x'+combo;document.getElementById('m').textContent=miss;}

function upd(){
  if(!go||pa)return;
  spT++;if(spT>Math.max(45-sc*0.03,20)){spT=0;spTile();if(Math.random()<0.4)spTile();}
  tiles.forEach(t=>{if(!t.hit)t.y+=spd+sc*0.002;});
  for(let i=tiles.length-1;i>=0;i--){if(!tiles[i].hit&&tiles[i].y>H+20){combo=0;miss++;tiles.splice(i,1);updH();}if(tiles[i].hit)tiles.splice(i,1);}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#0a0a2e');sk.addColorStop(1,'#1a1a3e');ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  // 轨道线
  for(let i=0;i<COLS;i++){ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i*CW,0);ctx.lineTo(i*CW,H);ctx.stroke();}
  // 方块
  tiles.forEach(t=>{ctx.fillStyle=t.c;ctx.fillRect(t.x+2,t.y,t.w-4,t.h);ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(t.x+2,t.y,t.w-4,4);});
  // 判定线
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H-60);ctx.lineTo(W,H-60);ctx.stroke();
  // 列标签
  const labels=['D','F','J','K'];labels.forEach((l,i)=>{ctx.fillStyle=colors[i];ctx.font='bold 20px Quicksand';ctx.textAlign='center';ctx.fillText(l,i*CW+CW/2,H-35);});
  if(pa){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFF';ctx.font='bold 30px Fredoka One';ctx.textAlign='center';ctx.fillText('⏸️',W/2,H/2);}
  if(!started){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFD700';ctx.font='bold 28px Fredoka One';ctx.textAlign='center';ctx.fillText('🎹 星际钢琴块',W/2,H/2-30);ctx.fillStyle='#FFF';ctx.font='16px Quicksand';ctx.fillText('按 D F J K 或点击方块',W/2,H/2+15);ctx.fillStyle='#0CC';ctx.font='bold 20px Quicksand';ctx.fillText('👆 点击"开始游戏" 👆',W/2,H/2+55);}
}

function startGame(){go=true;started=true;pa=false;tiles=[];sc=0;combo=0;best=1;miss=0;spT=0;updH();document.getElementById('startBtn').textContent='🎮 游戏中...';document.getElementById('startBtn').disabled=true;}
function rst(){tiles=[];sc=0;combo=0;best=1;miss=0;go=true;started=true;pa=false;spd=3;spT=0;updH();}
window.G={start:startGame,restart:rst,pause:()=>{if(!go)return;pa=!pa;}};

function loop(){upd();draw();requestAnimationFrame(loop);}
loop();
})();
</script>
</body>
</html>
