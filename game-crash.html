<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🚀 翻车模拟器 · 卡创</title>
<link rel="stylesheet" href="css/style.css">
<style>
#gc{border-radius:var(--radius-lg);border:3px solid rgba(255,255,255,0.12);box-shadow:var(--shadow-float);display:block;margin:0 auto;max-width:100%;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%);}
.hud{display:flex;justify-content:center;gap:1rem;margin:0.5rem 0;flex-wrap:wrap;}
.hud span{background:var(--bg-card);padding:0.35rem 0.9rem;border-radius:var(--radius-pill);font-family:var(--font-heading);font-size:0.9rem;border:1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<header class="site-header"><div class="nav-container">
<a href="game.html" class="nav-logo"><span class="logo-icon">💥</span><span>翻车模拟器</span></a>
<nav><ul class="nav-links"><li><a href="game.html">🎮游戏厅</a></li><li><a href="index.html">🏠首页</a></li></ul></nav>
</div></header>
<main><section class="page-container" style="text-align:center;">
<h2 style="font-family:var(--font-heading);margin-bottom:0.5rem;">🚀 翻车模拟器</h2>
<p style="color:var(--text-secondary);margin-bottom:0.5rem;">⬆️⬇️移动飞船躲避陨石！队友建议仅供参考！P暂停 M静音</p>
<div class="hud"><span>⏱️<b id="t">0.0s</b></span><span>🏆<b id="b">0.0s</b></span></div>
<canvas id="gc" width="700" height="500"></canvas>
<div style="margin-top:0.5rem;display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
<button class="btn btn-secondary" onmousedown="G.up()" ontouchstart="G.up();event.preventDefault()" style="font-size:1.2rem;padding:0.5rem 1.5rem;">⬆️上</button>
<button class="btn btn-secondary" onmousedown="G.down()" ontouchstart="G.down();event.preventDefault()" style="font-size:1.2rem;padding:0.5rem 1.5rem;">⬇️下</button>
<button class="btn btn-secondary" onclick="G.pause()" style="font-size:0.75rem;padding:0.3rem 0.9rem;">⏯️</button>
<button class="btn btn-secondary" onclick="G.restart()" style="font-size:0.75rem;padding:0.3rem 0.9rem;">🔄</button>
<a href="game.html" class="btn btn-secondary" style="font-size:0.75rem;padding:0.3rem 0.9rem;">🚪</a>
</div>
</section></main>
<script src="js/main.js"></script>
<script>
// 🎵
let mo=true;const ac=new(window.AudioContext||window.webkitAudioContext)();
function pn(f,d,s,t='square',v=0.04){if(!mo)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+d);}catch(e){}}
function bgm(){if(!mo)return;const n=ac.currentTime;[330,392,440,392,349,330,294,330,392,440,523,440,392,349,330,294].forEach((f,i)=>pn(f,0.18,n+i*0.2,'triangle',0.04));setTimeout(bgm,3500);}bgm();
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='m')mo=!mo;});

// 游戏
(function(){
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let sy=H/2,sx=120;
let rocks=[],particles=[],score=0,best=parseFloat(localStorage.getItem('cb'))||0,go=true,pa=false;
let adviceTimer=0,currentAdvice=null,adviceLife=0;
const adviceList=[
  {text:'小星：往左！不对，往右！等等…',from:'🐱'},
  {text:'火狐：冲！有23%把握没事！',from:'🦊'},
  {text:'胖达：慢点…要晕船了…',from:'🐼'},
  {text:'月兔：导航显示安全！（延迟3秒）',from:'🐰'},
  {text:'彩虹马：加速！我有魔法护盾！（假的）',from:'🦄'},
  {text:'企鹅船长：保持航向…迟早会炸。',from:'🐧'},
];

function spR(){rocks.push({x:W+50,y:Math.random()*H,r:15+Math.random()*25,vx:-(2+Math.random()*3+score/10),vy:(Math.random()-0.5)*2,c:['#888','#FDCB6E','#FF7675','#6C5CE7'][Math.floor(Math.random()*4)]});}
function spP(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*8-2,l:20+Math.random()*25,c,r:Math.random()*3+1});}

function hit(){
  go=false;spP(sx,sy,'#FF7675',50);
  if(score>best){best=score;localStorage.setItem('cb',best);}
  document.getElementById('b').textContent=best.toFixed(1);
  const taunts=['企鹅船长：我就知道。','火狐：下次成功率24%！','胖达：要吃点东西压惊吗？','小星：比我迷路还快！'];
  setTimeout(()=>{document.body.insertAdjacentHTML('beforeend','<div class="ov" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;" onclick="this.remove();G.restart()"><div style="background:var(--bg-dark);border:2px solid var(--color-primary);border-radius:var(--radius-xl);padding:2rem;text-align:center;"><div style="font-size:4rem;">💥</div><h2>翻车!</h2><p>'+taunts[Math.floor(Math.random()*taunts.length)]+'</p><div style="font-size:3rem;color:var(--color-accent-yellow);">'+score.toFixed(1)+'s</div><p>🏆最佳:'+best.toFixed(1)+'s</p><button class="btn btn-primary">🔄再来</button></div></div>');},600);
}

// 输入
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='p'){pa=!pa;return;}
  if(!go||pa)return;
  if(k==='arrowup'||k==='w')sy-=20;
  if(k==='arrowdown'||k==='s')sy+=20;
  sy=Math.max(30,Math.min(H-30,sy));
});

function upd(){
  if(!go||pa)return;
  score+=0.016;
  document.getElementById('t').textContent=score.toFixed(1);

  if(Math.random()<0.02+score/300)spR();
  if(score>4&&Math.random()<0.02+score/500)spR();

  adviceTimer++;if(adviceTimer>100+Math.random()*150){adviceTimer=0;currentAdvice=adviceList[Math.floor(Math.random()*adviceList.length)];adviceLife=130;}
  if(adviceLife>0)adviceLife--;else currentAdvice=null;

  rocks.forEach(r=>{r.x+=r.vx;r.y+=r.vy;});
  rocks=rocks.filter(r=>r.x>-80);
  rocks.forEach(r=>{if(Math.abs(r.x-sx)<r.r+20&&Math.abs(r.y-sy)<r.r+20)hit();});

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l--;p.vx*=0.95;p.vy*=0.95;});particles=particles.filter(p=>p.l>0);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // 星星
  for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(i+score*3)*0.15})`;ctx.beginPath();ctx.arc((i*137+score*30)%W,(i*97)%H*0.6,1,0,Math.PI*2);ctx.fill();}
  // 陨石
  rocks.forEach(r=>{ctx.font=`${r.r}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🪨',r.x,r.y);});
  // 粒子
  particles.forEach(p=>{ctx.fillStyle=p.c;ctx.globalAlpha=p.l/30;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  // 飞船
  ctx.font='40px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚀',sx,sy);
  // 建议气泡
  if(currentAdvice){const bw=ctx.measureText(currentAdvice.text).width+15;ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(sx+50,bw>200?sy-70:sy-55,bw+10,28);ctx.fillStyle='#fff';ctx.font='bold 13px Quicksand';ctx.textAlign='left';ctx.fillText(currentAdvice.from+' '+currentAdvice.text,sx+55,bw>200?sy-52:sy-37);}
  if(pa){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFF';ctx.font='bold 36px Fredoka One';ctx.textAlign='center';ctx.fillText('⏸️暂停',W/2,H/2);}
}

function rst(){sy=H/2;rocks=[];particles=[];score=0;go=true;pa=false;adviceTimer=0;currentAdvice=null;document.getElementById('b').textContent=best.toFixed(1);document.querySelectorAll('.ov').forEach(e=>e.remove());}
window.G={restart:rst,pause:()=>{if(!go)return;pa=!pa;},up:()=>{sy-=25;sy=Math.max(30,Math.min(H-30,sy));},down:()=>{sy+=25;sy=Math.max(30,Math.min(H-30,sy));}};

function loop(){upd();draw();requestAnimationFrame(loop);}
rst();for(let i=0;i<4;i++)spR();loop();
})();
</script>
</body>
</html>
