<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔍 企鹅船长推理 · 卡创</title>
<link rel="stylesheet" href="css/style.css">
<style>
.dcase{background:var(--bg-card);border-radius:var(--radius-xl);padding:1.5rem;border:2px solid rgba(0,206,201,0.3);margin-bottom:1rem;}
.dcase h3{font-family:var(--font-heading);color:var(--color-accent-teal);}
.clue{display:inline-block;background:var(--bg-glass);border-radius:var(--radius-md);padding:0.6rem 1rem;margin:0.3rem;cursor:pointer;border:2px solid transparent;transition:all 0.3s;font-size:0.85rem;}
.clue:hover,.clue.found{border-color:var(--color-accent-yellow);background:rgba(253,203,110,0.1);}
.clue.found{border-color:var(--color-accent-teal);}
.sus{display:inline-block;background:var(--bg-glass);border-radius:var(--radius-lg);padding:0.8rem;margin:0.3rem;text-align:center;cursor:pointer;border:2px solid transparent;transition:all 0.3s;min-width:80px;}
.sus:hover,.sus.asked{border-color:var(--color-accent-teal);background:rgba(0,206,201,0.1);}
.sus .emoji{font-size:2.5rem;}
.sus .name{font-family:var(--font-heading);}
.btn-acc{background:var(--color-accent-pink)!important;}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<header class="site-header"><div class="nav-container">
<a href="game.html" class="nav-logo"><span class="logo-icon">🔍</span><span>推理事务所</span></a>
<nav><ul class="nav-links"><li><a href="game.html">🎮游戏厅</a></li><li><a href="index.html">🏠首页</a></li></ul></nav>
</div></header>
<main><section class="page-container">
<div style="max-width:750px;margin:0 auto;">
<div style="text-align:center;margin-bottom:1.5rem;">
<h2 style="font-family:var(--font-heading);">🐧 企鹅船长的推理</h2>
<p style="color:var(--text-muted);">收集线索→询问嫌疑人→指认真凶！P暂停 M静音</p>
<div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.5rem;">
<a href="game.html" class="btn btn-secondary" style="font-size:0.75rem;padding:0.3rem 0.9rem;">🚪退出</a>
</div>
</div>
<div id="root"></div>
</div>
</section></main>
<script src="js/main.js"></script>
<script>
// 🎵
let mo=true;const ac=new(window.AudioContext||window.webkitAudioContext)();
function pn(f,d,s,t='triangle',v=0.03){if(!mo)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+d);}catch(e){}}
function bgm(){if(!mo)return;const n=ac.currentTime;[262,294,330,262,294,330,349,294,330,349,392,330,262,294,262,220].forEach((f,i)=>pn(f,0.4,n+i*0.6,'triangle',0.025));setTimeout(bgm,10000);}bgm();
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='m')mo=!mo;});

// 案件库(精简到6个最有趣的)
const CASES=[
{title:'竹炭星星蛋糕失踪案',victim:'胖达🐼',intro:'胖达的蛋糕不翼而飞。现场留下了橙色猫毛和梅花爪印。',
 clues:[{id:'a',t:'🔬橙色毛发',d:'猫科DNA，与小星99.7%匹配'},{id:'b',t:'👣爪印照片',d:'梅花形，猫科特有，约3.2cm'},{id:'c',t:'🍰唾液DNA',d:'含有竹子消化酶'},{id:'d',t:'🕐时间线',d:'14:00-14:30小星无不在场证明'}],
 sus:[{id:'x',e:'🐱',n:'小星',m:'偷吃蛋糕前科3次',a:'声称在探险无人目击',g:true,c:'喵…蛋糕太香了没忍住！'}],
 ans:'x',end:'小星耷拉着耳朵认错。胖达表示：帮忙做一周蛋糕就原谅。'},

{title:'引擎室爆炸未遂',victim:'火狐🦊',intro:'紧急制动装置被改动。黑白毛发遗留在现场。',
 clues:[{id:'a',t:'🔧无指纹扳手',d:'被擦拭过，刻着"引擎室"'},{id:'b',t:'📝叼笔字条',d:'"红色按钮别按"——用嘴写的'},{id:'c',t:'🧶黑白毛发',d:'熊科匹配94%'},{id:'d',t:'📋门禁记录',d:'14:22未知者进入，身高~1.2m'}],
 sus:[{id:'x',e:'🐼',n:'胖达',m:'走错门+好奇按钮',a:'案发时在做蛋糕',g:true,c:'走错门了…引擎室和厨房门太像了！'}],
 ans:'x',end:'胖达承认走错门后好奇按了按钮。第947起事故。'},

{title:'通信室神秘信号',victim:'月兔🐰',intro:'假喵星总部信号要求转移小鱼干。发射器就在飞船上。',
 clues:[{id:'a',t:'📡手工发射器',d:'焊接粗糙有创意，附狐狸毛'},{id:'b',t:'🎤合成录音',d:'非真实喵星人声纹'},{id:'c',t:'⚡星尘焊锡',d:'火狐常用材料'},{id:'d',t:'💡交叉比对',d:'有技术+爱恶作剧+喜欢小鱼干=火狐'}],
 sus:[{id:'x',e:'🦊',n:'火狐',m:'想测试无线电信标',a:'声称在写文档',g:true,c:'哈哈哈哈！月兔真去翻仓库了！'}],
 ans:'x',end:'月兔宣布对火狐通讯屏蔽一周。'},

{title:'糖果配方泄露案',victim:'彩虹马🦄',intro:'星光棒棒糖配方被黑洞甜品店复制。加密邮件从火狐电脑发出。',
 clues:[{id:'a',t:'🧾可疑转账',d:'胖达收到500星币——声称是退款'},{id:'b',t:'📧加密邮件',d:'火狐电脑发出，附件recipe.zip'},{id:'c',t:'📄通信室碎纸',d:'配方碎片背面有月兔记录编号'},{id:'d',t:'👁️深夜目击',d:'船长看到人影进通信室，有尾巴'}],
 sus:[{id:'x',e:'🦊',n:'火狐',m:'想破解黑洞防火墙——反被黑',a:'发了邮件但声称是测试',g:true,c:'我想黑他们…结果被反黑了，附件被拿走了！'}],
 ans:'x',end:'彩虹马取消火狐永久糖果折扣。'},

{title:'小星被困冰箱',victim:'小星🐱',intro:'失踪6小时后从冰箱爬出。门外有鱼干诱饵轨迹。',
 clues:[{id:'a',t:'🚪冰箱爪痕',d:'挣扎4小时，门从外面关闭'},{id:'b',t:'🪤鱼干包装',d:'火狐购买了3袋同款鱼干'},{id:'c',t:'⏰6h时间线',d:'12:15入厨房→12:20门关→18:20被发现'},{id:'d',t:'🎭异常行为',d:'月兔憋笑+火狐回避眼神'}],
 sus:[{id:'x',e:'🦊',n:'火狐',m:'小星踩坏了她的新发明',a:'在仓库——但笑得很可疑',g:true,c:'我在门口撒了鱼干！他自己走进去的！6小时完美复仇！'}],
 ans:'x',end:'火狐笑得直不起腰。小星裹毯子瑟瑟发抖。'},

{title:'辞职信失窃案',victim:'企鹅船长🐧',intro:'第385封辞职信不翼而飞。保险柜里多了信+猫爪印+匿名挽留信。',
 clues:[{id:'a',t:'🖊️S形墨迹',d:'猫科爪印但故意走S路线——偷偷摸摸'},{id:'b',t:'🔒保险柜',d:'需船长密码——只有船长和小星知道'},{id:'c',t:'💌匿名挽留信',d:'5种笔迹——"船长别走，你走了谁收拾烂摊子"'},{id:'d',t:'🕵️DNA报告',d:'猫爪印=小星99%。保险柜密码输入于凌晨3:12'}],
 sus:[{id:'x',e:'🐱',n:'小星',m:'不想船长走——唯一能收拾的人',a:'巡逻——身上有墨水味',g:true,c:'我偷的！放在保险柜里——输密码要很久，说不定他就放弃了！'}],
 ans:'x',end:'船长沉默后收起了辞职信。第二天开始起草第386封。'}];

let cur,cf=[],sq=[],ph='intro',wr=0;

function startCase(){cur=CASES[Math.floor(Math.random()*CASES.length)];cf=[];sq=[];ph='intro';wr=0;render();}
function findClue(id){if(!cf.includes(id)){cf.push(id);render();}}
function askSus(id){if(!sq.includes(id)){sq.push(id);render();}}
function accuse(id){
  if(id===cur.ans){ph='win';render();}
  else{wr++;ph='wrong';render();setTimeout(()=>{ph='investigate';render();},2000);}
}

function render(){
  const r=document.getElementById('root');
  if(!cur){startCase();return;}

  if(ph==='intro'){
    r.innerHTML=`<div class="dcase"><h3>📁 ${cur.title}</h3><p style="color:var(--text-secondary);">受害者：${cur.victim}</p><p style="color:var(--text-secondary);margin:0.8rem 0;">${cur.intro}</p><p style="color:var(--text-muted);">🐧 企鹅船长：开始调查吧。</p>
    <div style="text-align:center;margin-top:1rem;"><button class="btn btn-primary" onclick="ph='investigate';render();">🔍 开始调查</button></div></div>`;
  }else if(ph==='investigate'||ph==='wrong'){
    r.innerHTML=(ph==='wrong'?'<p style="color:var(--color-accent-pink);text-align:center;">❌冤枉好人！再查！</p>':'')+
      `<div class="dcase"><h3>🔍 线索 (${cf.length}/${cur.clues.length})</h3><div>${cur.clues.map(c=>`<span class="clue${cf.includes(c.id)?' found':''}" onclick="findClue('${c.id}')">${c.t}${cf.includes(c.id)?'<br><small>'+c.d+'</small>':'<br><small>(点击调查)</small>'}</span>`).join('')}</div></div>
      <div class="dcase"><h3>👥 嫌疑人 (${sq.length}/${cur.sus.length})</h3><div style="text-align:center;">${cur.sus.map(s=>`<span class="sus${sq.includes(s.id)?' asked':''}" onclick="askSus('${s.id}')"><div class="emoji">${s.e}</div><div class="name">${s.n}</div>${sq.includes(s.id)?'<small>🗣️'+s.a+'<br>💭'+s.m+'</small>':'<small>(点击讯问)</small>'}</span>`).join('')}</div></div>
      ${cf.length>=2?`<div style="text-align:center;margin-top:1rem;"><p style="color:var(--text-muted);">证据足够，指认真凶：</p>${cur.sus.map(s=>`<button class="btn btn-acc" onclick="accuse('${s.id}')" style="margin:0.2rem;">逮捕${s.e}${s.n}</button>`).join('')}${wr>0?`<p style="color:var(--color-accent-pink);">错误：${wr}次</p>`:''}</div>`:''}
      <div style="text-align:center;margin-top:1rem;"><button class="btn btn-secondary" onclick="startCase();">🔄换案件</button></div>`;
  }else if(ph==='win'){
    const g=cur.sus.find(s=>s.id===cur.ans);
    r.innerHTML=`<div class="dcase" style="border-color:var(--color-accent-teal);text-align:center;"><h3>🎉案件告破！</h3><div style="font-size:4rem;">🔓</div><p style="font-size:1.2rem;"><strong>真凶：${g.e} ${g.n}</strong></p><p style="color:var(--text-secondary);">🗣️ "${g.c}"</p><p style="color:var(--text-muted);margin-top:0.5rem;">${cur.end}</p>
    <div style="margin-top:1rem;"><button class="btn btn-primary" onclick="startCase();">📁下个案件</button> <a href="game.html" class="btn btn-secondary">🎮游戏厅</a></div></div>`;
  }
}
startCase();
</script>
</body>
</html>
