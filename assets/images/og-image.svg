<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#4A3DB7"/>
    </linearGradient>
    <radialGradient id="star">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 星星点缀 -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="300" cy="120" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="550" cy="60" r="2.5" fill="#A29BFE" opacity="0.8"/>
  <circle cx="800" cy="100" r="1.5" fill="#00CEC9" opacity="0.7"/>
  <circle cx="1050" cy="70" r="2" fill="#FDCB6E" opacity="0.8"/>
  <circle cx="150" cy="200" r="1" fill="white" opacity="0.5"/>
  <circle cx="950" cy="180" r="1.5" fill="#FF7675" opacity="0.6"/>
  <!-- 主标题 -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="72" font-weight="bold" fill="white">
    🐱 星际小猫号
  </text>
  <text x="600" y="350" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#00CEC9">
    卡创 · 出发！
  </text>
  <!-- 底部文字 -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#c8c8e8">
    🚀✨ 探索梦幻宇宙，和太空小猫一起冒险 🌌💫
  </text>
  <!-- 装饰小元素 -->
  <text x="150" y="450" font-size="48">🐱</text>
  <text x="250" y="460" font-size="36">🦊</text>
  <text x="350" y="450" font-size="42">🐼</text>
  <text x="750" y="450" font-size="38">🐰</text>
  <text x="850" y="460" font-size="40">🦄</text>
  <text x="960" y="450" font-size="36">🐧</text>
</svg>
