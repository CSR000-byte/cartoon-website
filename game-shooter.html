<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔫 卡创星际快跑 · 卡创</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔫</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
.wrap{max-width:960px;margin:0 auto;text-align:center;}
#gc{border-radius:var(--radius-lg);border:3px solid rgba(255,255,255,0.12);box-shadow:var(--shadow-float);display:block;margin:0 auto;max-width:100%;background:#0a0a1e;cursor:pointer;touch-action:none;}
.hrow{display:flex;justify-content:space-between;gap:0.3rem;margin-bottom:0.4rem;flex-wrap:wrap;}
.hc{background:var(--bg-card);border-radius:var(--radius-md);padding:0.3rem 0.6rem;border:1px solid rgba(255,255,255,0.08);font-family:var(--font-heading);font-size:0.85rem;min-width:50px;text-align:center;}
.hc .l{font-size:0.45rem;color:var(--text-muted);font-family:var(--font-body);display:block;}
.cp{display:flex;gap:0.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.5rem;}
.cb{padding:0.35rem 0.8rem;border-radius:var(--radius-pill);border:2px solid rgba(255,255,255,0.15);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:0.8rem;transition:all 0.2s;}
.cb:hover,.cb.on{border-color:var(--color-accent-teal);background:rgba(0,206,201,0.15);box-shadow:var(--shadow-glow-teal);}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;}
.eb{background:var(--bg-dark);border:2px solid var(--color-primary);border-radius:var(--radius-xl);padding:2rem;text-align:center;max-width:430px;box-shadow:var(--shadow-float-hover);}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<header class="site-header"><div class="nav-container">
<a href="game.html" class="nav-logo"><span class="logo-icon">🔫</span><span>卡创·星际快跑</span></a>
<nav><ul class="nav-links"><li><a href="game.html">🎮游戏厅</a></li><li><a href="index.html">🏠首页</a></li></ul></nav>
</div></header>
<main><section class="page-container"><div class="wrap">
<div class="section-header">
<div class="hero-badge" style="display:inline-block;margin-bottom:1rem;animation:float 2s ease-in-out infinite;">🔫自动奔跑射击</div>
<h1 class="section-title">🏃卡创星际快跑</h1>
<p class="section-subtitle">自动向前奔跑！跳跃闪避、射击消灭前方敌人！<br><small style="color:var(--text-muted);">选择英雄→空格跳跃→自动射击→消灭虫族！</small></p></div>

<div class="cp" id="cp">
<button class="cb on" data-c="xing">🐱小星</button>
<button class="cb" data-c="huo">🦊火狐</button>
<button class="cb" data-c="penguin">🐧企鹅船长</button>
<button class="cb" data-c="ma">🦄彩虹马</button>
</div>

<div class="hrow">
<div class="hc"><span class="l">⭐得分</span><span id="hs">0</span></div>
<div class="hc"><span class="l">❤️生命</span><span id="hh">❤️❤️❤️</span></div>
<div class="hc"><span class="l">🔫武器</span><span id="hw">Lv.1</span></div>
<div class="hc"><span class="l">📏距离</span><span id="hd">0m</span></div>
<div class="hc"><span class="l">💀击杀</span><span id="hki">0</span></div>
</div>

<canvas id="gc" width="900" height="420"></canvas>

<p style="color:var(--text-muted);margin-top:0.5rem;font-size:0.78rem;line-height:1.4;">
⌨️<strong>空格/W/↑</strong>跳跃 | <strong>S/↓</strong>蹲下 | 🖱️<strong>点击</strong>射击 | <strong>Q</strong>技能 | <strong>E</strong>大招 | <strong>P</strong>暂停 | <strong>M</strong>静音
</p>
<div style="display:flex;gap:0.4rem;justify-content:center;margin-top:0.3rem;">
<button class="btn btn-secondary" onclick="G.pause()" style="font-size:0.75rem;padding:0.25rem 0.8rem;">⏯️暂停</button>
<button class="btn btn-secondary" onclick="G.restart()" style="font-size:0.75rem;padding:0.25rem 0.8rem;">🔄重来</button>
<a href="game.html" class="btn btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.8rem;">🚪退出</a>
</div>
</div></section></main>
<div class="toast" id="toast"></div>
<script src="js/main.js"></script>
<script>
// ==================== 卡创星际快跑 v5 ====================
(function(){
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height,G=H-40;
if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};ctx.beginPath();ctx.moveTo(x+r.tl,y);ctx.lineTo(x+w-r.tr,y);ctx.arcTo(x+w,y,x+w,y+r.tr,r.tr);ctx.lineTo(x+w,y+h-r.br);ctx.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);ctx.lineTo(x+r.bl,y+h);ctx.arcTo(x,y+h,x,y+h-r.bl,r.bl);ctx.lineTo(x,y+r.tl);ctx.arcTo(x,y,x+r.tl,y,r.tl);ctx.closePath();};}

// === 🎵 配乐系统 ===
let musicOn=true;
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playNote(freq,dur,start,type='square',vol=0.06){
  if(!musicOn)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(0.001,start+dur);o.connect(g);g.connect(audioCtx.destination);o.start(start);o.stop(start+dur);}catch(e){}
}
function bgmShooter(){
  if(!musicOn)return;
  const now=audioCtx.currentTime;
  const melody=[262,330,392,330,294,349,440,349,330,392,523,440,392,330,294,262]; // C大调
  melody.forEach((f,i)=>{playNote(f,0.2,now+i*0.22,'triangle',0.04);});
  setTimeout(bgmShooter,melody.length*220+800);
}
bgmShooter();
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='m'){musicOn=!musicOn;showToast(musicOn?'🔊配乐开':'🔇静音');}});

// === 英雄(矮萌比例: 身体16×16, 短腿6px, 总高~28px) ===
const HR={
xing:{n:'小星',c:'#FF8C42',s:'#FFCC80',hp:5,sp:3,j:12,sk:'猫爪旋风',scd:180,
  draw(x,y,f){
    ctx.save();ctx.translate(x,y);ctx.scale(f,1);
    // 短腿
    const t=Date.now()*0.01;ctx.fillStyle='#E07030';
    ctx.fillRect(-4,8,5,5+Math.sin(t)*1.5);ctx.fillRect(1,8,5,5+Math.sin(t+Math.PI)*1.5);
    ctx.fillStyle='#3D2B1F';ctx.fillRect(-5,11,6,4);ctx.fillRect(0,11,6,4);
    // 圆身体
    ctx.fillStyle='#FF8C42';ctx.beginPath();ctx.roundRect(-7,-10,14,16,8);ctx.fill();
    ctx.fillStyle='#FFCC80';ctx.beginPath();ctx.roundRect(-3,-4,6,9,4);ctx.fill();
    // 圆头
    ctx.fillStyle='#FF8C42';ctx.beginPath();ctx.arc(0,-17,9,0,Math.PI*2);ctx.fill();
    // 小耳朵
    ctx.fillStyle='#FF8C42';ctx.beginPath();ctx.moveTo(-6,-23);ctx.lineTo(-9,-34);ctx.lineTo(-1,-25);ctx.fill();
    ctx.fillStyle='#FFB0B0';ctx.beginPath();ctx.moveTo(-4,-24);ctx.lineTo(-7,-32);ctx.lineTo(-2,-25);ctx.fill();
    ctx.fillStyle='#FF8C42';ctx.beginPath();ctx.moveTo(6,-23);ctx.lineTo(9,-34);ctx.lineTo(1,-25);ctx.fill();
    ctx.fillStyle='#FFB0B0';ctx.beginPath();ctx.moveTo(4,-24);ctx.lineTo(7,-32);ctx.lineTo(2,-25);ctx.fill();
    // 脸
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(4,-18,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1A1A1A';ctx.beginPath();ctx.arc(5,-18,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(5.5,-19,0.7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFB0B0';ctx.beginPath();ctx.arc(1,-13,1.2,0,Math.PI*2);ctx.fill();
    // 短尾
    ctx.strokeStyle='#FF8C42';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(6,2);ctx.quadraticCurveTo(14,-2,10,-10);ctx.stroke();
    // 小枪
    ctx.fillStyle='#6C5CE7';ctx.fillRect(8,-12,9,2.5);
    ctx.restore();
  }},
huo:{n:'火狐',c:'#FF5757',s:'#FFAAAA',hp:3,sp:3.5,j:13,sk:'爆裂手雷',scd:150,
  draw(x,y,f){
    ctx.save();ctx.translate(x,y);ctx.scale(f,1);
    const t=Date.now()*0.01;
    ctx.fillStyle='#CC4444';ctx.fillRect(-4,8,5,5+Math.sin(t)*1.5);ctx.fillRect(1,8,5,5+Math.sin(t+Math.PI)*1.5);
    ctx.fillStyle='#3D2B1F';ctx.fillRect(-5,11,6,4);ctx.fillRect(0,11,6,4);
    ctx.fillStyle='#FF5757';ctx.beginPath();ctx.roundRect(-7,-10,14,15,8);ctx.fill();
    ctx.fillStyle='#FFAAAA';ctx.beginPath();ctx.roundRect(-3,-4,6,8,4);ctx.fill();
    ctx.fillStyle='#FF5757';ctx.beginPath();ctx.arc(0,-17,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF5757';ctx.beginPath();ctx.moveTo(-6,-22);ctx.lineTo(-12,-38);ctx.lineTo(0,-25);ctx.fill();ctx.fillStyle='#FF9999';ctx.beginPath();ctx.moveTo(-4,-24);ctx.lineTo(-9,-35);ctx.lineTo(-1,-25);ctx.fill();
    ctx.fillStyle='#FF5757';ctx.beginPath();ctx.moveTo(6,-22);ctx.lineTo(12,-38);ctx.lineTo(0,-25);ctx.fill();ctx.fillStyle='#FF9999';ctx.beginPath();ctx.moveTo(4,-24);ctx.lineTo(9,-35);ctx.lineTo(1,-25);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(4,-18,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#3A0000';ctx.beginPath();ctx.arc(5,-18,1.8,0,Math.PI*2);ctx.fill();
    for(let i=-1;i<=1;i++){ctx.strokeStyle='#FF5757';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(6,2);ctx.quadraticCurveTo(15+i*4,-4,11+i*5,-16);ctx.stroke();}
    ctx.fillStyle='#FF7675';ctx.fillRect(8,-12,9,2.5);
    ctx.restore();
  }},
penguin:{n:'企鹅船长',c:'#2D3E50',s:'#ECEFF1',hp:7,sp:2.8,j:10,sk:'冰墙防御',scd:220,
  draw(x,y,f){
    ctx.save();ctx.translate(x,y);ctx.scale(f,1);
    const t=Date.now()*0.008;
    ctx.fillStyle='#1A2530';ctx.fillRect(-4,8,5,4+Math.sin(t)*1.5);ctx.fillRect(1,8,5,4+Math.sin(t+Math.PI)*1.5);
    ctx.fillStyle='#FF8C00';ctx.fillRect(-5,10,6,3);ctx.fillRect(0,10,6,3);
    ctx.fillStyle='#2D3E50';ctx.beginPath();ctx.roundRect(-7,-10,14,15,7);ctx.fill();
    ctx.fillStyle='#ECEFF1';ctx.beginPath();ctx.ellipse(0,-3,6,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2D3E50';ctx.beginPath();ctx.arc(0,-17,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1A1A2E';ctx.beginPath();ctx.ellipse(0,-21,10,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1A1A2E';ctx.fillRect(-3,-28,6,5);ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(0,-22,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF8C00';ctx.beginPath();ctx.moveTo(7,-17);ctx.lineTo(13,-19);ctx.lineTo(7,-15);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(4,-18,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1A1A1A';ctx.beginPath();ctx.arc(5,-18,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00CEC9';ctx.fillRect(8,-12,9,2.5);
    ctx.restore();
  }},
ma:{n:'彩虹马',c:'#FDCB6E',s:'#FFE8C0',hp:4,sp:3.3,j:14,sk:'星光冲刺',scd:160,
  draw(x,y,f){
    ctx.save();ctx.translate(x,y);ctx.scale(f,1);
    const t=Date.now()*0.01;
    ctx.fillStyle='#E0A050';ctx.fillRect(-5,8,6,5+Math.sin(t)*2);ctx.fillRect(2,8,6,5+Math.sin(t+Math.PI)*2);
    ctx.fillStyle='#FFD700';ctx.fillRect(-6,11,7,3);ctx.fillRect(1,11,7,3);
    ctx.fillStyle='#FDCB6E';ctx.beginPath();ctx.roundRect(-7,-10,14,16,8);ctx.fill();
    ctx.fillStyle='#FFE8C0';ctx.beginPath();ctx.roundRect(-3,-4,6,9,4);ctx.fill();
    ctx.fillStyle='#FDCB6E';ctx.beginPath();ctx.arc(0,-18,8,0,Math.PI*2);ctx.fill();
    const gr=ctx.createLinearGradient(0,-24,0,-40);gr.addColorStop(0,'#FFD700');gr.addColorStop(0.5,'#FF69B4');gr.addColorStop(1,'#9370DB');
    ctx.fillStyle=gr;ctx.beginPath();ctx.moveTo(-1,-24);ctx.lineTo(-4,-38);ctx.lineTo(2.5,-38);ctx.lineTo(1,-24);ctx.fill();
    ['#FF0000','#FF8800','#FFDD00','#00CC00','#0088FF','#8800FF'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(-5,-20+i*2.5);ctx.quadraticCurveTo(-13,-16+i*2,-11,-9+i*2);ctx.stroke();});
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(4,-19,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4A0080';ctx.beginPath();ctx.arc(5,-19,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF7675';ctx.fillRect(8,-13,9,2.5);
    ctx.restore();
  }}
};
let hk='xing',hero=HR[hk];

// === 状态 ===
let P,sX=0,dst=0,sc=0,hp=0,kl=0;
let ens=[],blt=[],par=[],flt=[],pup=[],eff=[];
let wLv=1,wTp='normal',wT=0,ammo=25,mxA=25,rld=0;
let scd=0,ucd=0,uT=0,inv=0,shk=0,spT=0;
let go=true,pa=false,jh=false,md=false;
let bm=[],bc=[],gd=[];
for(let i=0;i<25;i++)bm.push({x:Math.random()*W*4,h:55+Math.random()*90});
for(let i=0;i<12;i++)bc.push({x:Math.random()*W*4,y:10+Math.random()*90,w:40+Math.random()*90});
for(let i=0;i<50;i++)gd.push({x:Math.random()*W*4,h:2+Math.random()*5});

// === 敌人 ===
const EN={
  grunt:{n:'虫兵',hp:1,sc:10,sp:0.3,sz:16,fly:false,
    draw(x,y){const t=Date.now()*0.006;ctx.fillStyle='#7CFC00';ctx.beginPath();ctx.ellipse(x,y-1,9,6,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#F00';ctx.beginPath();ctx.arc(x+2,y-3,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+3,y-4,1.2,0,Math.PI*2);ctx.fill();for(let i=0;i<4;i++){const a=i*Math.PI/2+t;ctx.fillStyle='#555';ctx.beginPath();ctx.arc(x+Math.cos(a)*6,y+Math.sin(a)*2.5,1.5,0,Math.PI*2);ctx.fill();}}
  },
  spit:{n:'酸液虫',hp:2,sc:20,sp:0.15,sz:18,fly:false,sh:true,scd:85,
    draw(x,y){ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+2,y-2,4.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#F00';ctx.beginPath();ctx.arc(x+3,y-3,1.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.fillRect(x+7,y-2,5,1.5);}
  },
  jump:{n:'跳跳虫',hp:1,sc:15,sp:0.4,sz:14,fly:false,jp:true,
    draw(x,y){ctx.fillStyle='#FF69B4';ctx.beginPath();ctx.arc(x,y-2,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+2,y-4,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x+3,y-5,1.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FF1493';ctx.beginPath();ctx.arc(x,y+4,3.5,0,Math.PI);ctx.fill();}
  },
  tank:{n:'重甲虫',hp:4,sc:40,sp:0.1,sz:24,fly:false,sh:true,scd:105,
    draw(x,y){ctx.fillStyle='#8B0000';ctx.beginPath();ctx.roundRect(x-11,y-9,22,18,6);ctx.fill();ctx.fillStyle='#444';ctx.fillRect(x-9,y-13,6,4);ctx.fillStyle='#F44';ctx.beginPath();ctx.arc(x+5,y-2,4.5,0,Math.PI*2);ctx.fill();}
  },
  fly:{n:'飞翼虫',hp:2,sc:25,sp:0.2,sz:16,fly:true,sh:true,scd:75,
    draw(x,y){const t=Date.now()*0.012;ctx.fillStyle='#9370DB';ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(200,180,255,0.4)';ctx.beginPath();ctx.ellipse(x-6,y-1,6,3,0.4+Math.sin(t)*0.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+6,y-1,6,3,-0.4-Math.sin(t)*0.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+1,y-1,2.5,0,Math.PI*2);ctx.fill();}
  },
  boss:{n:'虫族女王',hp:25,sc:250,sp:0.05,sz:38,fly:false,sh:true,scd:32,isB:true,
    draw(x,y){const t=Date.now()*0.003;ctx.fillStyle='#4A0000';ctx.beginPath();ctx.ellipse(x,y-5,22,14,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B0000';ctx.beginPath();ctx.arc(x,y-7,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FF0';ctx.beginPath();ctx.arc(x,y-7,5,0,Math.PI*2);ctx.fill();for(let i=0;i<6;i++){const a=i*Math.PI/3+t;ctx.fillStyle='#600';ctx.beginPath();ctx.arc(x+Math.cos(a)*20,y-5+Math.sin(a)*8,3.5,0,Math.PI*2);ctx.fill();}}
  },
};

// === 角色选择 ===
document.getElementById('cp').addEventListener('click',e=>{
  const b=e.target.closest('.cb');if(!b||b.dataset.c===hk)return;
  document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');hk=b.dataset.c;hero=HR[hk];rst();
});

// === 输入 ===
const ks={};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='p'){paG();return;}
  if(!go||pa)return;
  ks[k]=true;
  if((k===' '||k==='w'||k==='arrowup')&&P.jm<2&&P.jt<=0){P.vy=-hero.j;P.jm++;P.og=false;P.jt=6;jh=true;}
  if(k==='q')useS();if(k==='e')useU();if(k==='r'&&!rld)rld=22;
  e.preventDefault();
});
window.addEventListener('keyup',e=>{ks[e.key.toLowerCase()]=false;if(e.key===' '||e.key==='w'||e.key==='arrowup')jh=false;});
cv.addEventListener('mousedown',e=>{md=true;e.preventDefault();});
cv.addEventListener('mouseup',()=>{md=false;});
cv.addEventListener('touchstart',e=>{md=true;const r=cv.getBoundingClientRect();if((e.touches[0].clientY-r.top)<H/2&&go&&!pa){P.vy=-hero.j;P.jm++;P.og=false;}e.preventDefault();},{passive:false});
cv.addEventListener('touchend',()=>{md=false;});
cv.addEventListener('contextmenu',e=>e.preventDefault());

// === 功能 ===
function spP(x,y,c,n){for(let i=0;i<n;i++)par.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*4-1,l:10+Math.random()*12,c,r:Math.random()*2+1});}
function flT(x,y,t,c){flt.push({x,y,t,c,l:25,vy:-2});}
function spE(tp){const e=EN[tp];ens.push({...e,tp,x:P.x+W+30+Math.random()*200,y:e.fly?50+Math.random()*140:G-e.sz,hp:e.hp+(e.isB?Math.floor(dst/150):Math.floor(dst/500)),mx:e.hp+(e.isB?Math.floor(dst/150):Math.floor(dst/500)),vx:0,vy:0,og:false,st:0,fz:0});}
function hurt(d){if(inv>0||!go)return;hp-=d;inv=30;shk=5;spP(P.x,P.y,'#F66',12);if(hp<=0){go=false;spP(P.x,P.y,'#FD0',30);
  setTimeout(()=>{const o=document.createElement('div');o.className='ov';
    o.innerHTML=`<div class="eb"><div style="font-size:4rem;">💥</div><h2 style="font-family:var(--font-heading);">倒下！</h2><p style="color:var(--text-secondary);">${hero.n}跑了${Math.floor(dst)}米</p><div style="font-size:2.5rem;font-family:var(--font-heading);color:var(--color-accent-yellow);">⭐${sc}</div><p style="color:var(--text-muted);">击杀:${kl}</p><div style="display:flex;gap:0.4rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;"><button class="btn btn-primary" onclick="this.closest('.ov').remove();rst();">🔄再来</button><a href="game.html" class="btn btn-secondary">🎮游戏厅</a></div></div>`;
    document.body.appendChild(o);},500);}}

function useS(){if(scd>0||!go||pa)return;scd=hero.scd;const px=P.x,py=P.y;
  switch(hk){case'xing':ens.forEach(e=>{if(Math.abs(e.x-px)<70&&Math.abs(e.y-py)<50){e.hp-=2;e.vx-=4;spP(e.x,e.y,'#FFF',6);}});flT(px,py-20,'🐾旋风!','#FFF');break;
  case'huo':setTimeout(()=>{ens.forEach(e=>{if(Math.abs(e.x-(px+30))<80){e.hp-=4;spP(e.x,e.y,'#F66',8);}});spP(px+30,py,'#F66',18);},280);flT(px,py-20,'💥手雷!','#F66');break;
  case'penguin':eff.push({x:px+30,y:G-35,l:180,tp:'ice'});flT(px,py-20,'🧊冰墙!','#0CC');break;
  case'ma':P.vx+=6;inv=10;ens.forEach(e=>{if(Math.abs(e.x-px)<65){e.hp-=3;spP(e.x,e.y,'#FD0',6);}});spP(px,py,'#FD0',10);break;}}
function useU(){if(ucd>0||!go||pa)return;ucd=450;uT=260;
  switch(hk){case'xing':flT(P.x,P.y-25,'🐱喵星召唤!','#F84');break;
  case'huo':eff.push({x:0,y:0,l:320,tp:'fire'});flT(P.x,P.y-25,'🔥火焰风暴!','#F00');break;
  case'penguin':ens.forEach(e=>{e.fz=200;spP(e.x,e.y,'#0CC',3);});flT(P.x,P.y-25,'❄️绝对零度!','#0CC');break;
  case'ma':ens.forEach(e=>{if(Math.abs(e.y-P.y)<160){e.hp-=6;spP(e.x,e.y,'#FD0',5);}});flT(P.x,P.y-25,'🌈彩虹审判!','#FD0');break;}}

function shoot(){if(!go||pa||rld>0)return;if(ammo<=0){rld=22;return;}ammo--;
  const bx=P.x+10,by=P.y-10,bs=6;
  switch(wTp){case'normal':blt.push({x:bx,y:by,vx:bs,vy:0,dmg:1,c:hero.c,r:2});if(wLv>=3)blt.push({x:bx,y:by-4,vx:bs,vy:0,dmg:1,c:hero.c,r:1.8});if(wLv>=5)blt.push({x:bx,y:by+4,vx:bs,vy:0,dmg:1,c:hero.c,r:1.8});break;
  case'spread':for(let a=-0.16;a<=0.16;a+=0.08)blt.push({x:bx,y:by,vx:Math.cos(a)*bs,vy:Math.sin(a)*bs,dmg:0.8,c:'#FD0',r:1.8});break;
  case'laser':blt.push({x:bx,y:by,vx:bs*1.4,vy:0,dmg:1.5,c:'#0CC',r:3,pen:true});if(wLv>=4)blt.push({x:bx,y:by-3,vx:bs*1.4,vy:0,dmg:1.5,c:'#0CC',r:2.5,pen:true});break;
  case'homing':const n=ens.reduce((b,e)=>{const d=Math.hypot(e.x-P.x,e.y-P.y);return(!b||d<b.d)?{e,d}:b;},{e:null,d:1e9});const a=n.e?Math.atan2(n.e.y-by,n.e.x-bx):0;blt.push({x:bx,y:by,vx:Math.cos(a)*bs*0.6,vy:Math.sin(a)*bs*0.6,dmg:1.2,c:'#F6B',r:2.2,hm:true,tg:n.e});break;}}

function rst(){
  P={x:80,y:G-20,w:14,h:28,vy:0,jm:0,mx:2,og:true,cr:false,st:0,jt:0};
  sX=0;dst=0;sc=0;hp=hero.hp;kl=0;ens=[];blt=[];par=[];flt=[];pup=[];eff=[];
  wLv=1;wTp='normal';wT=0;ammo=mxA;rld=0;scd=0;ucd=0;uT=0;inv=0;spT=0;
  go=true;pa=false;document.querySelectorAll('.ov').forEach(e=>e.remove());updH();
}
function paG(){if(!go)return;pa=!pa;showToast(pa?'⏸️暂停':'▶️继续');}
window.G={restart:rst,pause:paG};

// === 主循环 ===
function upd(){
  if(!go||pa)return;
  const spd=hero.sp+Math.min(dst/1000,1.6);
  P.x+=spd;dst+=spd*0.5;sX+=(P.x-W/3-sX)*0.15;

  P.cr=!!(ks['s']||ks['arrowdown']);
  const ch=P.cr?16:28;

  if(jh&&P.jm<P.mx&&P.jt<=0){P.vy=-hero.j;P.jm++;P.og=false;P.jt=5;}
  if(P.jt>0)P.jt--;

  P.vy+=0.45;P.y+=P.vy;
  if(P.y+ch>=G){P.y=G-ch;P.vy=0;P.og=true;P.jm=0;}

  P.st++;if(md&&P.st%6===0)shoot();
  if(rld>0){rld--;if(rld<=0)ammo=mxA;}
  if(scd>0)scd--;if(ucd>0)ucd--;if(uT>0)uT--;if(inv>0)inv--;if(shk>0)shk--;
  if(wT>0){wT--;if(wT<=0){wTp='normal';wLv=1;}}

  blt.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.hm&&b.tg){const a=Math.atan2(b.tg.y-b.y,b.tg.x-b.x);b.vx+=Math.cos(a)*0.2;b.vy+=Math.sin(a)*0.2;const s=Math.hypot(b.vx,b.vy);b.vx=b.vx/s*6;b.vy=b.vy/s*6;}});
  blt=blt.filter(b=>b.x>P.x-40&&b.x<P.x+W+60);

  spT++;const rt=Math.max(50-dst/45,16);
  if(spT>=rt){spT=0;const r=Math.random();
    if(dst>1800&&!ens.some(e=>e.isB)&&Math.random()<0.05+dst/16000)spE('boss');
    else if(r<0.35)spE('grunt');else if(r<0.55)spE('spit');else if(r<0.7)spE('jump');else if(r<0.87)spE('tank');else spE('fly');
  }
  if(Math.random()<0.0035)pup.push({x:P.x+W/2+Math.random()*200,y:G-35-Math.random()*150,tp:['spread','laser','homing','heal','shield','ammo'][Math.floor(Math.random()*6)],l:300});

  ens.forEach(e=>{
    if(e.fz>0){e.fz--;return;}
    const dx=P.x-e.x;e.vx=(dx>0?0.35:-0.2)*e.sp;
    if(e.jp&&e.og&&Math.random()<0.02&&Math.abs(dx)<220){e.vy=-6;e.og=false;}
    if(e.fly){e.y+=Math.sin(Date.now()*0.003+e.st)*0.7;e.st+=0.02;}
    else{e.vy+=0.4;e.y+=e.vy;if(e.y+e.sz>=G){e.y=G-e.sz;e.vy=0;e.og=true;}}
    e.x+=e.vx;
    if(e.sh&&e.st<=0&&e.x>P.x-60&&e.x<P.x+W){e.st=e.scd;const a2=Math.atan2(P.y-e.y,P.x-e.x);blt.push({x:e.x-6,y:e.y,vx:Math.cos(a2)*3.2,vy:Math.sin(a2)*3.2,dmg:1,c:e.isB?'#F00':'#FA0',r:2.8,eb:true});if(e.isB)for(let i=-1;i<=1;i+=1)blt.push({x:e.x-6,y:e.y+i*8,vx:-2.8,vy:i*0.6,dmg:1,c:'#F00',r:2.2,eb:true});}
    if(e.st>0)e.st--;
    eff.forEach(ef=>{if(ef.tp==='ice'&&Math.abs(e.x-ef.x)<40&&e.y>ef.y-45)e.vx=0;});
  });
  ens=ens.filter(e=>e.x>P.x-W);

  // 碰撞：子弹vs敌人（正确命中检测）
  for(let bi=blt.length-1;bi>=0;bi--){
    const b=blt[bi];if(b.eb)continue;
    for(let ei=ens.length-1;ei>=0;ei--){
      const e=ens[ei];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz*0.6+b.r){
        e.hp-=b.dmg;if(!b.pen)blt.splice(bi,1);
        spP(b.x,b.y,b.c,3);
        if(e.hp<=0){sc+=e.sc;kl++;spP(e.x,e.y,e.isB?'#FD0':'#FFF',e.isB?20:8);flT(e.x,e.y,'+'+e.sc,'#FD0');
          if(e.isB){spP(e.x,e.y,'#FD0',30);pup.push({x:e.x,y:e.y,tp:['spread','laser','homing'][Math.floor(Math.random()*3)],l:300});}
          ens.splice(ei,1);}break;}
    }
  }
  for(let i=blt.length-1;i>=0;i--){const b=blt[i];if(b.eb&&Math.abs(b.x-P.x)<10&&Math.abs(b.y-P.y)<16){blt.splice(i,1);hurt(1);}}
  ens.forEach(e=>{if(Math.abs(e.x-P.x)<e.sz*0.5+8&&Math.abs(e.y-P.y)<e.sz*0.5+14){hurt(1);e.vx-=4;}});

  for(let i=pup.length-1;i>=0;i--){const p=pup[i];p.x-=0.7;
    if(Math.abs(p.x-P.x)<22&&Math.abs(p.y-P.y)<28){
      if(p.tp==='heal'){hp=Math.min(hp+1,hero.hp+2);flT(p.x,p.y,'+❤️','#F66');}
      else if(p.tp==='shield'){inv=160;flT(p.x,p.y,'🛡️','#0CC');}
      else if(p.tp==='ammo'){ammo=mxA;flT(p.x,p.y,'🔫','#FD0');}
      else{wTp=p.tp;wLv=Math.min(wLv+1,5);wT=500;flT(p.x,p.y,{spread:'💥散弹',laser:'⚡激光',homing:'🎯追踪'}[p.tp],'#FD0');}
      spP(p.x,p.y,'#FFF',6);pup.splice(i,1);
    }
  }
  pup=pup.filter(p=>p.l-->0&&p.x>P.x-W/2);
  eff.forEach(ef=>{ef.l--;if(ef.tp==='fire'&&ef.l%10===0)ens.forEach(e=>{e.hp-=0.3;spP(e.x,e.y,'#F66',1);});});
  eff=eff.filter(ef=>ef.l>0);
  par.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l--;p.vx*=0.93;p.vy*=0.93;});par=par.filter(p=>p.l>0);
  flt.forEach(f=>{f.y+=f.vy;f.l--;});flt=flt.filter(f=>f.l>0);
  updH();
}

function updH(){
  document.getElementById('hs').textContent=sc;
  document.getElementById('hh').textContent=Array(Math.max(0,hp)).fill('❤️').join('');
  document.getElementById('hw').textContent={normal:'🔫Lv.'+wLv,spread:'💥Lv.'+wLv,laser:'⚡Lv.'+wLv,homing:'🎯Lv.'+wLv}[wTp];
  document.getElementById('hd').textContent=Math.floor(dst)+'m';
  document.getElementById('hki').textContent=kl;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#0a0a2e');sk.addColorStop(0.5,'#1a1a4e');sk.addColorStop(1,'#2d1b4e');
  ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  for(let i=0;i<22;i++){const sx=((i*137+sX*0.03)%W+W)%W;ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(i+Date.now()*0.002)*0.2})`;ctx.beginPath();ctx.arc(sx,(i*83)%H*0.5,0.7,0,Math.PI*2);ctx.fill();}
  bm.forEach(m=>{const mx=((m.x-sX*0.07)%(W*4)+W*4)%(W*4)-W;ctx.fillStyle='#1a1a3e';ctx.beginPath();ctx.moveTo(mx-70,G);ctx.lineTo(mx,G-m.h);ctx.lineTo(mx+70,G);ctx.fill();});
  bc.forEach(c=>{const clx=((c.x-sX*0.03)%(W*4)+W*4)%(W*4)-W;ctx.fillStyle='rgba(255,255,255,0.025)';ctx.beginPath();ctx.ellipse(clx,c.y,c.w,c.w*0.2,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#4A7C59';ctx.fillRect(0,G,W,H-G);ctx.strokeStyle='#5A9C6E';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,G);ctx.lineTo(W,G);ctx.stroke();
  gd.forEach(g=>{const gx=((g.x-sX*0.7)%(W*4)+W*4)%(W*4)-W;if(gx>-12&&gx<W+12){ctx.strokeStyle='#7BC67E';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(gx,G);ctx.lineTo(gx+Math.sin(gx*0.2+Date.now()*0.002)*2,G-g.h);ctx.stroke();}});
  pup.forEach(p=>{const px=p.x-sX;if(px<-25||px>W+25)return;const ic={spread:'💥',laser:'⚡',homing:'🎯',heal:'💖',shield:'🛡️',ammo:'🔫'};ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(ic[p.tp]||'?',px,p.y);ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(px,p.y,12,0,Math.PI*2);ctx.stroke();});
  eff.forEach(ef=>{const ex=ef.x-sX;if(ef.tp==='ice'){ctx.fillStyle='rgba(0,200,220,0.4)';ctx.fillRect(ex-2,ef.y-25,6,35);ctx.strokeStyle='#FFF';ctx.lineWidth=1.2;ctx.strokeRect(ex-2,ef.y-25,6,35);}if(ef.tp==='fire'){ctx.fillStyle='rgba(255,0,0,0.18)';ctx.fillRect(0,0,W,H);}});
  ens.forEach(e=>{const ex=e.x-sX;if(ex<-50||ex>W+50)return;EN[e.tp].draw(ex,e.y);if(e.fz>0){ctx.strokeStyle='#0CC';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(ex,e.y,e.sz*0.65,0,Math.PI*2);ctx.stroke();}if(e.hp<e.mx){const bw=e.sz;ctx.fillStyle='#000';ctx.fillRect(ex-bw/2,e.y-e.sz-7,bw,3);ctx.fillStyle=e.hp/e.mx>0.5?'#0F0':'#F00';ctx.fillRect(ex-bw/2,e.y-e.sz-7,bw*e.hp/e.mx,3);}});
  blt.forEach(b=>{const bx=b.x-sX;if(bx<-25||bx>W+25)return;ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=2.5;ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  par.forEach(p=>{const px=p.x-sX;ctx.globalAlpha=p.l/16;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(px,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  flt.forEach(f=>{ctx.fillStyle=f.c;ctx.font='bold 12px Quicksand';ctx.textAlign='center';ctx.globalAlpha=f.l/25;ctx.fillText(f.t,f.x-sX,f.y);});ctx.globalAlpha=1;
  // 玩家
  const px=P.x-sX,py=P.y;
  if(inv<=0||Math.floor(Date.now()/55)%2===0){
    ctx.save();ctx.translate(px,py);if(P.cr)ctx.scale(1,0.55);
    if(inv>130){const g2=ctx.createRadialGradient(0,-8,3,0,-8,30);g2.addColorStop(0,'rgba(0,200,220,0.3)');g2.addColorStop(1,'transparent');ctx.fillStyle=g2;ctx.beginPath();ctx.arc(0,-8,30,0,Math.PI*2);ctx.fill();}
    hero.draw(0,0,1);ctx.restore();
  }
  if(rld>0){ctx.fillStyle='#FFF';ctx.font='bold 12px Quicksand';ctx.textAlign='center';ctx.fillText('🔄',px,py-24);}
  if(pa){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFF';ctx.font='bold 30px Fredoka One';ctx.textAlign='center';ctx.fillText('⏸️暂停',W/2,H/2);}
}

function loop(){upd();draw();requestAnimationFrame(loop);}
P={x:80,y:G-20,w:14,h:28,vy:0,jm:0,mx:2,og:true,cr:false,st:0,jt:0};hp=hero.hp;updH();loop();
})();
</script>
</body>
</html>
