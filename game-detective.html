}];

let cur,cf=[],sq=[],ph='intro',wr=0;

function startCase(){cur=CASES[Math.floor(Math.random()*CASES.length)];cf=[];sq=[];ph='intro';wr=0;render();}
function findClue(id){if(!cf.includes(id)){cf.push(id);render();}}
function askSus(id){if(!sq.includes(id)){sq.push(id);render();}}
function accuse(id){
  if(id===cur.ans){ph='win';render();}
  else{wr++;ph='wrong';render();setTimeout(()=>{ph='investigate';render();},2000);}
}

function render(){
  const r=document.getElementById('root');if(!cur){startCase();return;}
  if(ph==='intro'){
    r.innerHTML=`<div class="case-box"><h3>📁 ${cur.title}</h3><p style="color:#DAA520;">👤 ${cur.ve} ${cur.vic} | 📋 状态: <span class="badge bg-red">调查中</span></p><div class="typewriter">${cur.intro}</div><p style="color:var(--text-muted);font-style:italic;">🐧 企鹅船长:"仔细调查每个线索,讯问所有嫌疑人。真相只有一个。"</p><div style="text-align:center;margin-top:1.2rem;"><button class="btn btn-primary" onclick="ph='investigate';render();" style="font-size:1rem;padding:0.7rem 2rem;">🔍 开始调查</button></div></div>`;
  }else if(ph==='investigate'||ph==='wrong'){
    r.innerHTML=(ph==='wrong'?'<p style="color:#FF7675;text-align:center;font-weight:bold;margin-bottom:0.5rem;">❌ 冤枉好人！继续调查…</p>':'')+
      `<div class="case-box"><h3>🔍 线索调查 <span class="badge bg-gold">${cf.length}/${cur.clues.length}</span></h3><div class="clue-grid">${cur.clues.map(c=>`<div class="clue-card${cf.includes(c.id)?' found':''}" onclick="findClue('${c.id}')"><span class="ci">${c.t}</span><strong>${c.h}</strong>${cf.includes(c.id)?'<br><small style="color:#DAA520;">→ '+c.d+'</small>':'<br><small style="color:var(--text-muted);">(点击调查)</small>'}</div>`).join('')}</div></div>
      <div class="case-box"><h3>👥 嫌疑人讯问 <span class="badge bg-gold">${sq.length}/${cur.sus.length}</span></h3><div class="sus-grid">${cur.sus.map(s=>`<div class="sus-card${sq.includes(s.id)?' asked':''}" onclick="askSus('${s.id}')"><span class="se">${s.e}</span><div class="sn">${s.n}</div>${sq.includes(s.id)?'<div class="sa">🗣️ '+s.a+'<br>💭 '+s.m+'</div>':'<small style="color:var(--text-muted);">(点击讯问)</small>'}</div>`).join('')}</div></div>
      ${cf.length>=2?`<div style="text-align:center;margin:1.5rem 0;"><p style="color:var(--text-muted);margin-bottom:0.5rem;">证据充分——指认真凶:</p>${cur.sus.map(s=>`<button class="btn btn-acc" onclick="accuse('${s.id}')" style="margin:0.3rem;">🔒 ${s.e}${s.n}</button>`).join('')}${wr>0?`<p style="color:#FF7675;margin-top:0.5rem;">错误逮捕:${wr}次</p>`:''}</div>`:''}
      <div style="text-align:center;"><button class="btn btn-secondary" onclick="startCase();" style="font-size:0.85rem;">🔄 换案件</button></div>`;
  }else if(ph==='win'){
    const g=cur.sus.find(s=>s.id===cur.ans);
    r.innerHTML=`<div class="case-box" style="border-color:#DAA520;text-align:center;"><h3>🎉 案件告破!</h3><div style="font-size:5rem;">🔓</div><p style="font-size:1.3rem;color:#DAA520;"><strong>真凶: ${g.e} ${g.n}</strong></p><div class="typewriter">🗣️ <strong>供词:</strong> "${g.c}"</div><p style="color:var(--text-secondary);margin-top:0.8rem;line-height:1.6;">${cur.end}</p><div style="margin-top:1.5rem;display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="startCase();">📁 下个案件</button><a href="game.html" class="btn btn-secondary">🎮 游戏厅</a></div></div>`;
  }
}
startCase();
</script>
</body>
</html>
